        window.syncMatches = function(m) {

            if (idx >= 0) ms[idx] = cleanMatch; else ms.unshift(cleanMatch);

        // --- TOSS LOGIC ---
        window.tossSetCaller = (tm) => { window.appState.tossState.caller = tm; window.appState.tossState.phase = 'call'; window.renderApp(); };

            } else if (ts.phase === 'call') {
                inner = `
                    <div class="pop-in"><h2 class="text-2xl font-black text-blue-700 dark:text-blue-400 mb-2">${ts.caller}</h2>

                inner = `<div class="flex justify-center pop-in"><div class="w-32 h-32 rounded-full bg-gradient-to-tr from-yellow-400 to-yellow-200 coin-anim shadow-2xl border-4 border-yellow-500 flex items-center justify-center"><span class="text-5xl">🪙</span></div></div>`;
            } else if (ts.phase === 'decision') {

                    <h2 class="text-2xl font-black text-gray-900 dark:text-white mb-2">${ts.winner} ${t.wonToss || "won the toss"}</h2>
                    <p class="text-gray-600 dark:text-slate-400 text-sm mb-6">${t.whatChoose || "What will they choose?"}</p>
                    <div class="flex gap-4">
                        <button type="button" onclick="window.tossDecision('bat')" class="flex-1 text-white bg-blue-600 py-4 rounded-xl font-bold uppercase tracking-widest hover:bg-blue-700 shadow-md">${t.batting || "Batting"}</button>
                        <button type="button" onclick="window.tossDecision('bowl')" class="flex-1 text-white bg-red-600 py-4 rounded-xl font-bold uppercase tracking-widest hover:bg-red-700 shadow-md">${t.bowling || "Bowling"}</button>

            return `<div class="flex-1 flex flex-col items-center justify-center p-6 w-full h-full"><div class="w-full max-w-md bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-3xl p-6 text-center shadow-xl pop-in min-h-[300px] flex flex-col justify-center">${inner}</div></div>`;
        };

        // --- NEW TIMELINE REPLAY ENGINE ---
        // This is mathematically flawless and avoids all previous duplicate ball/over errors
        window.rebuildMatchState = function() {
            let m = window.appState.activeMatch;
            if(!m) return;

            const t = dict[window.appState.lang] || dict['en'];
            const actions = m.actions ? [...m.actions] : [];
            const renames = m.renames ? {...m.renames} : {};

            let temp = {
                id: m.id,
                isSetup: false,
                language: m.language,
                team1: m.team1,
                team2: m.team2,
                overs: m.overs,
                innings: 1,
                matchStatus: 'playing',
                roundStr: m.roundStr,
                revisedTarget: m.revisedTarget,
                isSuperOver: m.isSuperOver,
                tieBreakerInfo: m.tieBreakerInfo,
                mainScore1: m.mainScore1 ? JSON.parse(JSON.stringify(m.mainScore1)) : null,
                mainScore2: m.mainScore2 ? JSON.parse(JSON.stringify(m.mainScore2)) : null,
                score1: window.INITIAL_INNINGS(t, false),
                score2: window.INITIAL_INNINGS(t, true),
                isFreeHit: false,
                actions: actions,
                renames: renames,
                createdAt: m.createdAt
            };

            // Inject Custom Renames
            temp.score1.batter1.name = renames[temp.score1.batter1.name] || temp.score1.batter1.name;
            temp.score1.batter2.name = renames[temp.score1.batter2.name] || temp.score1.batter2.name;
            temp.score1.bowler.name = renames[temp.score1.bowler.name] || temp.score1.bowler.name;
            temp.score2.batter1.name = renames[temp.score2.batter1.name] || temp.score2.batter1.name;
            temp.score2.batter2.name = renames[temp.score2.batter2.name] || temp.score2.batter2.name;
            temp.score2.bowler.name = renames[temp.score2.bowler.name] || temp.score2.bowler.name;

            window.appState.isWaitingForNext = false;

            for (let i = 0; i < actions.length; i++) {
                temp = window.processBallDirect(temp, actions[i], i);
            }

            const currentSc = temp.innings === 1 ? temp.score1 : temp.score2;
            if (currentSc.isOverComplete && temp.matchStatus === 'playing') {
                window.appState.isWaitingForNext = true;
            }

            window.appState.activeMatch = temp;
            window.saveMatch(temp);
            window.syncMatches(temp);
            
            // Auto-transition views if match state changed naturally via timeline replay
            if (temp.matchStatus === 'innings_break' && window.appState.view === 'scoring') {
                window.appState.view = 'innings_break';
            } else if (temp.matchStatus !== 'playing' && temp.matchStatus !== 'innings_break' && window.appState.view === 'scoring') {
                window.appState.view = 'end';
            }
            
            window.renderApp();
        };

        window.processBallDirect = function(m, act, globalIndex) {
            if (act.isStartInnings2) {
                m.innings = 2;
                m.matchStatus = 'playing';
                m.isFreeHit = false;
                return m;
            }

            if (act.isDeclaration) {
                if (m.innings === 1) m.matchStatus = 'innings_break';
                else {
                    const target = m.revisedTarget ? m.revisedTarget : m.score1.runs + 1;
                    if (m.score2.runs >= target) m.matchStatus = 'team2_won';
                    else if (m.score2.runs < target - 1) m.matchStatus = 'team1_won';
                    else m.matchStatus = 'tie';
                }
                return m;
            }

            // Auto-switch to innings 2 if the previous ball caused innings_break
            if (m.matchStatus === 'innings_break') {
                m.innings = 2;
                m.matchStatus = 'playing';
                m.isFreeHit = false;
            }

            const sc = m.innings === 1 ? m.score1 : m.score2;
            const t = dict[m.language] || dict['en'];

            if (act.bowlerName && sc.bowler.name !== act.bowlerName) {
                if (sc.isOverComplete || sc.currentOverLog.length > 0) {
                    sc.previousOvers.push({ overNum: sc.previousOvers.length + 1, runs: sc.currentOverRuns, log: [...sc.currentOverLog], bowlerName: sc.bowler.name });
                    sc.currentOverLog = []; sc.currentOverRuns = 0; sc.isOverComplete = false;
                }
                let b = sc.allBowlers.find(x => x.name === act.bowlerName);
                if (!b) { b = { name: act.bowlerName, runs: 0, wickets: 0, balls: 0, wides: 0, noBalls: 0 }; sc.allBowlers.push(b); }
                sc.bowler = b; 
            }

            if (act.isDummy) return m;

            let striker = sc.striker === 1 ? sc.batter1 : sc.batter2;

            let isLegal = true;
            let label = act.runs.toString();
            let totalRuns = act.runs + act.extraRuns + act.runOutRuns;
            let wasFreeHit = m.isFreeHit;

            const getBat = (name) => {
                let b = sc.allBatters.find(x => x.name === name);
                if (!b) { b = { name, runs: 0, balls: 0, fours: 0, sixes: 0, isOut: false }; sc.allBatters.push(b); }
                return b;
            };

            if (act.extraType === 'WD') {
                isLegal = false;
                const wides = 1 + act.extraRuns + act.runOutRuns + (act.runs || 0);
                sc.extras += wides;
                sc.wides += 1;
                sc.runs += wides;
                sc.currentOverRuns += wides;
                const addedWides = wides - 1;
                label = `WD${addedWides > 0 ? '+'+addedWides : ''}`;
                
                sc.bowler.runs += wides;
                sc.bowler.wides += 1;
                totalRuns = wides;
            } else if (act.extraType === 'NB') {
                isLegal = false;
                sc.extras += 1;
                sc.noBalls += 1;
                const batsmanRuns = act.runs + act.extraRuns + act.runOutRuns;
                sc.runs += 1 + batsmanRuns;
                sc.currentOverRuns += 1 + batsmanRuns;
                label = `NB${batsmanRuns > 0 ? '+'+batsmanRuns : ''}`;
                m.isFreeHit = true;
                
                sc.bowler.runs += 1 + batsmanRuns;
                sc.bowler.noBalls += 1;

                striker.balls += 1;
                striker.runs += batsmanRuns;
                if (batsmanRuns === 4) striker.fours++;
                if (batsmanRuns === 6) striker.sixes++;

                const btInAll = getBat(striker.name);
                btInAll.balls++;
                btInAll.runs += batsmanRuns;
                if (batsmanRuns === 4) btInAll.fours++;
                if (batsmanRuns === 6) btInAll.sixes++;
                totalRuns = 1 + batsmanRuns;
            } else if (act.extraType === 'LB' || act.extraType === 'BYE') {
                isLegal = true;
                const byes = act.runs + act.extraRuns + act.runOutRuns;
                sc.extras += byes;
                sc.runs += byes;
                sc.currentOverRuns += byes;
                sc.balls += 1;
                sc.bowler.balls += 1;
                label = `${byes}${act.extraType === 'BYE' ? 'B' : 'LB'}`;
                
                striker.balls += 1;
                getBat(striker.name).balls++;
                totalRuns = byes;
            } else {
                if (wasFreeHit) m.isFreeHit = false;
                sc.balls += 1;
                const batR = act.runs + act.runOutRuns;
                sc.runs += batR;
                sc.currentOverRuns += batR;
                sc.bowler.balls += 1;
                sc.bowler.runs += batR;

                striker.balls += 1;
                striker.runs += batR;
                if (act.runs === 4) striker.fours++;
                if (act.runs === 5) striker.fours++;
                if (act.runs === 6) striker.sixes++;

                const btInAll = getBat(striker.name);
                btInAll.balls++;
                btInAll.runs += batR;
                if (act.runs === 4) btInAll.fours++;
                if (act.runs === 5) btInAll.fours++;
                if (act.runs === 6) btInAll.sixes++;
                totalRuns = batR;
            }

            if (act.isWicket) {
                if (wasFreeHit && act.wicketType !== 'Run Out') {
                    // Free Hit ignores wickets except Run Out
                } else {
                    sc.wickets += 1;
                    if (act.wicketType !== 'Run Out') {
                        sc.bowler.wickets += 1;
                    }

                    let wktLabel = act.wicketType;
                    if (act.wicketType === 'Run Out') wktLabel = `RO${act.runOutRuns > 0 ? '+'+act.runOutRuns : ''}`;
                    else if (act.wicketType === 'Caught') wktLabel = 'C';
                    else if (act.wicketType === 'Bowled') wktLabel = 'B';
                    else if (act.wicketType === 'Stumped') wktLabel = 'ST';

                    if (act.extraType) label = `${act.extraType}+W(${wktLabel})`;
                    else label = `W(${wktLabel})`;

                    const outBatter = sc.striker === 1 ? sc.batter1 : sc.batter2;
                    outBatter.isOut = true;

                    let dString = '';
                    const fName = act.fielderName.trim() || 'Sub';
                    if (act.wicketType === 'Bowled') dString = `b ${sc.bowler.name}`;
                    else if (act.wicketType === 'Caught') dString = `c ${fName} b ${sc.bowler.name}`;
                    else if (act.wicketType === 'Stumped') dString = `st ${fName} b ${sc.bowler.name}`;
                    else if (act.wicketType === 'Run Out') dString = `run out (${fName})`;

                    outBatter.dismissal = dString;
                    outBatter.dismissalType = act.wicketType;
                    outBatter.fielder = act.fielderName.trim();
                    outBatter.bowler = sc.bowler.name;

                    const nextIdx = sc.wickets + 1;
                    const pfx = m.innings === 2 ? '\u200B' : '';
                    let nb = sc.allBatters[nextIdx];
                    if (!nb) {
                        nb = { name: `${pfx}${t.batsmen} ${sc.wickets + 2}`, runs: 0, balls: 0, fours: 0, sixes: 0, isOut: false };
                        sc.allBatters.push(nb);
                    }
                    nb.name = m.renames[nb.name] || nb.name;

                    if (sc.striker === 1) sc.batter1 = nb; else sc.batter2 = nb;
                    
                    if (act.wicketType === 'Run Out' && act.runOutRuns > 0) {
                        outBatter.runs += act.runOutRuns;
                        getBat(outBatter.name).runs += act.runOutRuns;
                    }
                }
            }

            let netRunsForSwap = 0;
            if (act.extraType === 'WD') netRunsForSwap = act.extraRuns + act.runOutRuns + (act.runs || 0);
            else if (act.extraType === 'NB') netRunsForSwap = act.runs + act.extraRuns + act.runOutRuns;
            else if (act.extraType === 'LB' || act.extraType === 'BYE') netRunsForSwap = act.runs + act.extraRuns + act.runOutRuns;
            else netRunsForSwap = act.runs + act.runOutRuns;

            if (netRunsForSwap % 2 !== 0) {
                sc.striker = sc.striker === 1 ? 2 : 1;
            }

            if (isLegal && sc.balls > 0 && sc.balls % 6 === 0) {
                sc.isOverComplete = true;
                sc.striker = sc.striker === 1 ? 2 : 1;
            }

            if (m.innings === 1 && (sc.wickets >= 10 || sc.balls >= m.overs * 6)) {
                m.matchStatus = 'innings_break';
            } else if (m.innings === 2) {
                const target = m.revisedTarget ? m.revisedTarget : m.score1.runs + 1;
                if (sc.runs >= target) {
                    m.matchStatus = 'team2_won';
                } else if (sc.wickets >= 10 || sc.balls >= m.overs * 6) {
                    m.matchStatus = sc.runs < target - 1 ? 'team1_won' : 'tie';
                }
            }

            sc.currentOverLog.push({ 
                label, isLegal, isWicket: act.isWicket, runs: totalRuns, extraType: act.extraType,
                runVal: act.runs, extraRuns: act.extraRuns, wicketType: act.wicketType, fielderName: act.fielderName, roRuns: act.runOutRuns, bowlerName: sc.bowler.name,
                globalIndex: globalIndex
            });

            return m;
        };

        // --- SCORES RECORDING ROUTINES ---
        window.submitEditOrRun = function(runs, extraType=null, extraRuns=0, isWicket=false, wicketType='', fielderName='', roRuns=0) {
            try {
                let m = window.appState.activeMatch;
                
                if (window.appState.editTargetGlobalIndex !== null) {
                    const act = m.actions[window.appState.editTargetGlobalIndex];
                    m.actions[window.appState.editTargetGlobalIndex] = {
                        runs, extraType, extraRuns, isWicket, wicketType, fielderName, runOutRuns: roRuns, bowlerName: act.bowlerName
                    };
                    window.appState.editTargetGlobalIndex = null;
                    window.rebuildMatchState();
                    window.closeModal();
                    return;
                }

                const sc = m.innings === 1 ? m.score1 : m.score2;
                if (sc.isOverComplete || window.appState.isWaitingForNext) return;

                if (!m.actions) m.actions = [];
                m.actions.push({
                    runs, extraType, extraRuns, isWicket, wicketType, fielderName, runOutRuns: roRuns, bowlerName: sc.bowler.name
                });
                
                window.rebuildMatchState();
            } catch (e) {
                console.error("Error processing ball:", e);
                window.customAlert("An error occurred while entering the score.");
            }
        };

        window.manualSwap = () => {
            let m = window.appState.activeMatch;
            if (!m.actions) m.actions = [];
            // To record a pure swap, we could add a pseudo-action. But simplest is manual override.
            const sc = m.innings === 1 ? m.score1 : m.score2;
            sc.striker = sc.striker === 1 ? 2 : 1;
            window.saveMatch(m); window.syncMatches(m); window.renderApp();
        };

        window.undoAction = () => {
            let m = window.appState.activeMatch;
            if (!m || !m.actions || m.actions.length === 0) return;
            m.actions.pop();
            window.rebuildMatchState();
        };

            window.appState.view = 'scoring';
            window.undoAction();
        };

        window.openEditNameModal = (role) => {
            let m = window.appState.activeMatch;
            const sc = m.innings === 1 ? m.score1 : m.score2;
            let currentName = '';
            if(role === 'striker') currentName = sc.striker === 1 ? sc.batter1.name : sc.batter2.name;
            else if(role === 'nonStriker') currentName = sc.striker === 1 ? sc.batter2.name : sc.batter1.name;
            else if(role === 'bowler') currentName = sc.bowler.name;

            window.appState.modal = {type: 'editName', arg1: role, arg2: currentName};
            window.renderApp();
        };

        window.openEditBallModal = (globalIndex) => {
             let m = window.appState.activeMatch;
             if (!m.actions || globalIndex >= m.actions.length || globalIndex < 0) return;
             
             window.appState.editTargetGlobalIndex = globalIndex;
             window.openModal('edit_ball_keypad', null, null);
        };

        window.finishEditBallDelete = () => {
            let m = window.appState.activeMatch;
            let gIdx = window.appState.editTargetGlobalIndex;
            if (gIdx === null || !m.actions || gIdx >= m.actions.length) { window.closeModal(); return; }

            m.actions.splice(gIdx, 1);
            window.appState.editTargetGlobalIndex = null;
            window.rebuildMatchState();
            window.closeModal();
        };

        window.submitNextBowler = (name, isMidOver, isSkip = false) => {
            name = name ? name.trim() : null;
            let m = window.appState.activeMatch;
            if (!m.actions) m.actions = [];
            const sc = m.innings === 1 ? m.score1 : m.score2;
            const t = dict[window.appState.lang] || dict['en'];
            
            if (isSkip || !name) {
                const pfx = m.innings === 2 ? '\u200B' : '';
                name = `${pfx}${t.bowler} ${sc.allBowlers.length + 1}`;
            }

            // Pseudo action to track bowler change explicitly if mid over
            if (isMidOver) {
                m.renames[sc.bowler.name] = name;
                window.rebuildMatchState();
                window.closeModal();
                return;
            }

            // Normal over end
            const action = { runs: 0, extraType: null, extraRuns: 0, isWicket: false, wicketType: '', fielderName: '', runOutRuns: 0, bowlerName: name, isDummy: true };
            m.actions.push(action);
            window.rebuildMatchState();
            window.closeModal();
        };

        window.submitEditName = (role, oldName, newName) => {
            newName = newName.trim();
            if (!newName || newName === oldName) { window.closeModal(); return; }
            let m = window.appState.activeMatch;
            if(!m.renames) m.renames = {};
            m.renames[oldName] = newName;
            
            // Rewrite history to ensure the name reflects correctly from the start
            if (m.actions) {
                m.actions.forEach(a => {
                    if (a.bowlerName === oldName) a.bowlerName = newName;
                    if (a.fielderName === oldName) a.fielderName = newName;
                });
            }
            
            window.rebuildMatchState();
            window.closeModal();
        };

        window.submitEditOvers = (newOvers, applyDls) => {
            let m = window.appState.activeMatch;
            m.overs = newOvers;
            window.rebuildMatchState();
            window.closeModal();
        };

        window.submitEndInnings = () => {
            let m = window.appState.activeMatch;
            if (!m.actions) m.actions = [];
            m.actions.push({ isDeclaration: true });
            window.rebuildMatchState();
        };

        window.renderScoring = function(t, m) {
            const score = m.innings === 1 ? m.score1 : m.score2;
            const striker = score.striker === 1 ? score.batter1 : score.batter2;
            const nStriker = score.striker === 1 ? score.batter2 : score.batter1;
            const crr = window.calcCRR(score.runs, score.balls);
            
            const getBallColorClass = (b) => {
                if (b.isWicket) return 'bg-red-600 text-white border-transparent shadow-[0_0_10px_rgba(220,38,38,0.5)]';
                if (b.extraType === 'NB') return 'bg-red-500 text-white border-transparent shadow-sm';
                if (b.extraType === 'WD') return 'bg-yellow-500 text-yellow-950 border-transparent shadow-sm';
                if (b.extraType === 'BYE') return 'bg-purple-500 text-white border-transparent shadow-sm';
                if (b.extraType === 'LB') return 'bg-orange-500 text-white border-transparent shadow-sm';
                if (b.label.startsWith('6')) return 'bg-blue-600 ring-2 ring-blue-300 text-white border-transparent shadow-sm';
                if (b.label.startsWith('4')) return 'bg-blue-500 text-white border-transparent shadow-sm';
                if (b.label === '0') return 'bg-gray-100 dark:bg-slate-800 text-gray-500 dark:text-slate-400 border border-gray-300 dark:border-slate-700';
                return 'bg-gray-200 dark:bg-slate-700 text-gray-900 dark:text-white border border-gray-300 dark:border-slate-600 font-black';
            };
            
            let targetHtml = '';
            if (m.innings === 2) {
                let targetScore = m.revisedTarget ? m.revisedTarget : m.score1.runs + 1;
                let needRuns = targetScore - score.runs;
                let ballsL = (m.overs * 6) - score.balls;
                let reqRate = window.calcCRR(needRuns, ballsL);
                targetHtml = `
                    <div class="mt-5 pt-4 border-t border-white/20 flex justify-between items-center bg-black/20 -mx-5 -mb-5 px-5 py-3 relative z-10 shadow-inner">
                        <div><div class="text-[10px] text-blue-200 font-bold uppercase tracking-widest">${t.target} ${m.revisedTarget ? '(DLS)' : ''}</div><div class="text-xl font-black">${targetScore}</div></div>
                        <div class="text-center px-4"><div class="text-sm font-black text-yellow-400">${needRuns > 0 ? needRuns : 0} ${t.need}</div><div class="text-[10px] text-blue-200 font-bold uppercase tracking-widest">${ballsL} ${t.balls}</div></div>
                        <div class="text-right"><div class="text-[10px] text-blue-200 font-bold uppercase tracking-widest">${t.reqRate}</div><div class="text-xl font-black">${reqRate}</div></div>
                    </div>
                `;
            }

            let freeHitHtml = m.isFreeHit ? `
                <div class="absolute top-3 right-3 bg-yellow-400 text-black text-[10px] font-black px-3 py-1 rounded shadow-lg animate-pulse flex items-center gap-1 z-20"><i class="fa-solid fa-triangle-exclamation"></i> ${t.freeHit}</div>
            ` : '';

            let pastOversHtml = '';
            if (score.previousOvers.length > 0) {
                let rows = '';
                [...score.previousOvers].reverse().forEach((o, i) => {
                    const ones = o.log.filter(b => b.runVal === 1 && b.extraType === null).length;
                    const twos = o.log.filter(b => b.runVal === 2 && b.extraType === null).length;
                    const threes = o.log.filter(b => b.runVal === 3 && b.extraType === null).length;
                    const fours = o.log.filter(b => b.runVal === 4 && b.extraType === null).length;
                    const fives = o.log.filter(b => b.runVal === 5 && b.extraType === null).length;
                    const sixes = o.log.filter(b => b.runVal === 6 && b.extraType === null).length;
                    const extras = o.log.filter(b => b.extraType !== null).length;
                    const wkts = o.log.filter(b => b.actIsWicket).length;
                    
                    let ballsHtml = '';
                    o.log.forEach((b, bi) => {
                        if(b.isDummy) return;
                        let colorClass = getBallColorClass(b);
                        ballsHtml += `<button type="button" onclick="window.openEditBallModal(${b.globalIndex})" class="shrink-0 score-bubble shadow-sm transition-transform active:scale-95 hover:ring-2 hover:ring-blue-400 cursor-pointer ${colorClass}">${b.label}</button>`;
                    });

                    rows += `
                        <div class="flex flex-col bg-gray-50 dark:bg-slate-800/40 border border-gray-200 dark:border-slate-800 p-2.5 rounded-xl shadow-sm">
                            <div class="grid grid-cols-[40px_1fr_repeat(9,minmax(20px,1fr))] gap-2 items-center text-center px-1">
                               <div class="text-left font-black text-gray-900 dark:text-white text-base">${o.overNum}</div>
                               <div class="text-xs text-gray-800 dark:text-slate-300 font-bold text-left truncate max-w-[80px]">${o.bowlerName}</div>
                               <div class="font-black text-gray-900 dark:text-white">${o.runs}</div>
                               <div class="font-black ${wkts > 0 ? 'text-red-600 dark:text-red-500' : 'text-gray-400 dark:text-slate-500'}">${wkts}</div>
                               <div class="font-black ${ones > 0 ? 'text-gray-700 dark:text-slate-300' : 'text-gray-300 dark:text-slate-600'}">${ones}</div>
                               <div class="font-black ${twos > 0 ? 'text-gray-700 dark:text-slate-300' : 'text-gray-300 dark:text-slate-600'}">${twos}</div>
                               <div class="font-black ${threes > 0 ? 'text-gray-700 dark:text-slate-300' : 'text-gray-300 dark:text-slate-600'}">${threes}</div>
                               <div class="font-black ${fours > 0 ? 'text-blue-600 dark:text-blue-400' : 'text-gray-300 dark:text-slate-600'}">${fours}</div>
                               <div class="font-black ${fives > 0 ? 'text-purple-600 dark:text-purple-400' : 'text-gray-300 dark:text-slate-600'}">${fives}</div>
                               <div class="font-black ${sixes > 0 ? 'text-blue-600 dark:text-blue-400' : 'text-gray-300 dark:text-slate-600'}">${sixes}</div>
                               <div class="font-black ${extras > 0 ? 'text-yellow-600 dark:text-yellow-500' : 'text-gray-300 dark:text-slate-600'}">${extras}</div>
                            </div>
                            <div class="mt-3 pt-3 border-t border-gray-200 dark:border-slate-700 flex gap-2 overflow-x-auto custom-scroll pb-1">
                                ${ballsHtml}
                            </div>
                        </div>
                    `;
                });

                pastOversHtml = `
                    <div class="bg-white dark:bg-slate-900 border border-gray-300 dark:border-slate-800 rounded-xl p-3 shadow-xl mt-4">
                        <div class="text-[10px] text-gray-500 dark:text-slate-400 font-black uppercase mb-3 flex justify-between items-center tracking-widest px-1">
                           ${t.past || "Past Overs"}
                           <span class="text-gray-400 dark:text-slate-500 lowercase font-medium tracking-normal">(Tap a ball to edit)</span>
                        </div>
                        <div class="grid grid-cols-[40px_1fr_repeat(9,minmax(20px,1fr))] gap-2 text-[9px] text-gray-400 dark:text-slate-500 font-bold text-center mb-2 px-1 border-b border-gray-200 dark:border-slate-700 pb-2">
                           <div class="text-left col-span-2">OVER</div>
                           <div>R</div><div>W</div><div>1s</div><div>2s</div><div>3s</div><div>4s</div><div>5s</div><div>6s</div><div>Ex</div>
                        </div>
                        <div class="space-y-3">${rows}</div>
                    </div>
                `;
            }

            let currentBallsHtml = score.currentOverLog.length === 0 ? `<div class="text-gray-400 dark:text-slate-600 text-xs italic font-bold">...</div>` : '';
            score.currentOverLog.forEach((b, i) => {
                if(b.isDummy) return;
                let colorClass = getBallColorClass(b);
                currentBallsHtml += `<button type="button" onclick="window.openEditBallModal(${b.globalIndex})" class="shrink-0 score-bubble shadow-md transition-transform active:scale-95 hover:ring-2 hover:ring-blue-400 cursor-pointer ${colorClass}">${b.label}</button>`;
            });

            return `
                <div class="p-3 space-y-4 max-w-lg mx-auto w-full pb-10">
                    <!-- Main Score Card -->
                    <div class="bg-gradient-to-r from-blue-700 to-blue-900 dark:from-blue-900 dark:to-slate-900 rounded-2xl p-5 shadow-xl relative overflow-hidden border border-blue-800 dark:border-slate-700 text-white">
                        <div class="absolute top-0 right-0 w-40 h-40 bg-white/10 rounded-full -mr-10 -mt-10 blur-2xl"></div>
                        <div class="flex justify-between items-end relative z-10">
                            <div>
                                <div class="flex items-baseline gap-1">
                                    <span class="text-7xl font-black tabular-nums tracking-tighter drop-shadow-md">${score.runs}</span>
                                    <span class="text-3xl text-blue-200 font-bold">/${score.wickets}</span>
                                </div>
                            </div>
                            <div class="text-right flex flex-col items-end">
                                <div class="text-sm font-bold text-white flex items-center gap-1 bg-black/30 px-3 py-1.5 rounded-xl border border-white/20 shadow-inner">
                                    ${window.fmtOvers(score.balls)} <span class="text-xs text-blue-200 font-medium">/ ${m.overs}</span>
                                    <button type="button" onclick="window.openModal('editOvers')" class="text-white hover:text-blue-300 ml-1 p-1 touch-manipulation"><i class="fa-solid fa-pen text-sm"></i></button>
                                </div>
                                <div class="text-xs font-bold text-blue-200 mt-2 uppercase tracking-widest">${t.runRate}: <span class="text-white text-sm ml-1">${crr}</span></div>
                            </div>
                        </div>
                        ${targetHtml}
                        ${freeHitHtml}
                    </div>

                    <!-- Batter / Bowler Card -->
                    <div class="bg-white dark:bg-slate-900 border border-gray-300 dark:border-slate-800 rounded-xl overflow-hidden shadow-xl">
                        <!-- Batters -->
                        <div class="p-2 pb-1 border-b border-gray-200 dark:border-slate-800/50">
                            <div class="grid grid-cols-[1fr_28px_28px_32px] gap-2 items-center text-[10px] text-gray-500 dark:text-slate-400 font-black mb-1 px-2 uppercase tracking-widest">
                                <span>${t.batsmen || 'Batsmen'}</span><span class="text-right">R</span><span class="text-right">B</span><span class="text-right">${t.sr}</span>
                            </div>
                            <div class="grid grid-cols-[1fr_28px_28px_32px] gap-2 items-center bg-blue-50 dark:bg-blue-900/20 p-2 rounded-lg mb-1 border border-blue-200 dark:border-blue-500/20 shadow-sm cursor-pointer group" onclick="window.openEditNameModal('striker')">
                                <div class="flex items-center gap-2 font-bold truncate">
                                    <span class="w-2.5 h-2.5 bg-blue-600 dark:bg-blue-500 rounded-full animate-pulse shrink-0"></span>
                                    <span class="truncate text-gray-900 dark:text-white text-base">${striker.name}</span>
                                    <i class="fa-solid fa-pen text-blue-500/50 opacity-0 group-hover:opacity-100 shrink-0 text-[10px] ml-1"></i>
                                </div>
                                <span class="text-right font-black text-base tabular-nums text-gray-900 dark:text-white">${striker.runs}</span><span class="text-right text-gray-600 dark:text-slate-400 font-bold tabular-nums">${striker.balls}</span><span class="text-right text-blue-600 dark:text-blue-400 font-bold text-xs tabular-nums">${window.calcSR(striker.runs, striker.balls)}</span>
                            </div>
                            
                            <div class="flex justify-center -my-2 relative z-10">
                                <button type="button" onclick="window.manualSwap()" class="bg-white dark:bg-slate-800 p-2 rounded-full border border-gray-300 dark:border-slate-600 text-gray-600 dark:text-slate-400 hover:text-blue-600 shadow-md" title="Swap Strike">
                                    <i class="fa-solid fa-arrow-right-arrow-left text-sm"></i>
                                </button>
                            </div>

                            <div class="grid grid-cols-[1fr_28px_28px_32px] gap-2 items-center p-2 rounded-lg text-gray-600 dark:text-slate-400 cursor-pointer group" onclick="window.openEditNameModal('nonStriker')">
                                <div class="flex items-center gap-2 font-bold truncate">
                                    <span class="w-2.5 h-2.5 bg-transparent border-2 border-gray-400 dark:border-slate-600 rounded-full shrink-0"></span>
                                    <span class="truncate text-gray-900 dark:text-slate-200">${nStriker.name}</span>
                                    <i class="fa-solid fa-pen text-gray-400 dark:text-slate-500/50 opacity-0 group-hover:opacity-100 shrink-0 text-[10px] ml-1"></i>
                                </div>
                                <span class="text-right font-bold tabular-nums text-gray-800 dark:text-slate-300">${nStriker.runs}</span><span class="text-right tabular-nums font-medium">${nStriker.balls}</span><span class="text-right text-xs tabular-nums font-medium">${window.calcSR(nStriker.runs, nStriker.balls)}</span>
                            </div>
                        </div>
                        
                        <!-- Bowler -->
                        <div class="p-2 bg-gray-50 dark:bg-slate-800/30">
                            <div class="grid grid-cols-[1fr_32px_24px_24px_32px] gap-2 items-center text-[10px] text-gray-500 dark:text-slate-400 font-black mb-1 px-2 uppercase tracking-widest">
                                <span>${t.bowler || 'Bowler'}</span><span class="text-right">O</span><span class="text-right">R</span><span class="text-right">W</span><span class="text-right">${t.eco}</span>
                            </div>
                            <div class="grid grid-cols-[1fr_32px_24px_24px_32px] gap-2 items-center p-2 rounded-lg text-gray-800 dark:text-slate-200 cursor-pointer group" onclick="window.openEditNameModal('bowler')">
                                <div class="flex items-center gap-2 font-bold truncate">
                                    <span class="truncate text-gray-900 dark:text-white text-base">${score.bowler.name}</span>
                                    <i class="fa-solid fa-pen text-gray-400 dark:text-slate-500/50 opacity-0 group-hover:opacity-100 shrink-0 text-[10px] ml-1"></i>
                                </div>
                                <span class="text-right text-gray-600 dark:text-slate-400 font-bold tabular-nums flex items-center justify-end gap-1">
                                    ${window.fmtOvers(score.bowler.balls)}
                                    <button type="button" onclick="event.stopPropagation(); window.openModal('bowler', 1, null)" class="text-blue-600 dark:text-blue-500 p-1 hover:bg-blue-100 dark:bg-slate-700 rounded border border-blue-200 dark:border-transparent"><i class="fa-solid fa-rotate text-xs"></i></button>
                                </span>
                                <span class="text-right font-black tabular-nums text-gray-900 dark:text-white text-base">${score.bowler.runs}</span><span class="text-right text-red-600 dark:text-red-500 font-black tabular-nums text-base">${score.bowler.wickets}</span><span class="text-right text-yellow-600 dark:text-yellow-500 font-bold text-xs tabular-nums">${window.calcEco(score.bowler.runs, score.bowler.balls)}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Current Over Log -->
                    <div class="bg-white dark:bg-slate-900 border border-gray-300 dark:border-slate-800 rounded-xl p-4 flex flex-col justify-center shadow-xl relative min-h-[100px]">
                        <div class="flex justify-between items-center mb-3">
                            <div class="text-[10px] text-gray-500 dark:text-slate-400 font-black uppercase flex items-center gap-2 tracking-widest">
                                ${t.over} <span class="text-gray-400 dark:text-slate-500 lowercase font-medium tracking-normal">(Tap a ball to edit)</span>
                            </div>
                            <button type="button" onclick="window.openModal('score')" class="text-[10px] text-blue-600 dark:text-blue-400 flex items-center gap-1 font-black uppercase z-20 hover:text-blue-800 transition-colors touch-manipulation border px-2 py-1 rounded border-blue-200 dark:border-blue-900"><i class="fa-solid fa-chart-simple text-sm"></i> ${t.score}</button>
                        </div>
                        <div class="flex gap-2 overflow-x-auto pb-2 custom-scroll items-center min-h-[44px]">
                            ${currentBallsHtml}
                        </div>

                        ${window.appState.isWaitingForNext ? `
                            <div class="absolute inset-0 bg-white/95 dark:bg-slate-900/95 backdrop-blur-md z-10 rounded-xl flex flex-col items-center justify-center pop-in border border-blue-500/50 shadow-inner">
                                <button type="button" onclick="window.openModal('bowler', 0, null)" class="px-8 py-4 bg-blue-600 text-white font-black uppercase tracking-widest rounded-xl shadow-xl shadow-blue-500/30 hover:bg-blue-700 active:scale-95 transition-all border-2 border-blue-400">
                                    ${t.nextOver || "Start Next Over"}
                                </button>
                                <button type="button" onclick="window.submitNextBowler(null, false, true)" class="mt-4 text-xs font-bold text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 underline underline-offset-4" style="background:none;border:none;">${t.skip || "Skip for Now"}</button>
                            </div>
                        ` : ''}
                    </div>

                    <!-- Past Overs -->
                    ${pastOversHtml}

                    <!-- Keypad -->
                    <div class="bg-white dark:bg-slate-900 border border-gray-300 dark:border-slate-800 p-2 rounded-xl grid grid-cols-4 gap-2 shadow-lg transition-opacity mt-4 ${window.appState.isWaitingForNext ? 'opacity-50 pointer-events-none' : ''}">
                        ${[0,1,2,3,4,5,6].map(r => `
                            <button type="button" onclick="window.submitEditOrRun(${r})" class="h-16 rounded-xl font-black text-2xl transition-transform active:scale-95 shadow-md border touch-manipulation ${r===6 ? 'text-white bg-blue-600 border-blue-700 shadow-[0_0_15px_rgba(37,99,235,0.5)]' : r===4 ? 'text-white bg-blue-500 border-blue-600 shadow-[0_0_10px_rgba(59,130,246,0.4)]' : r===5 ? 'text-white bg-purple-600 border-purple-700 shadow-[0_0_10px_rgba(147,51,234,0.4)]' : r===0 ? 'bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-slate-400 border-gray-300 dark:border-slate-700 hover:bg-gray-200 dark:hover:bg-slate-700' : 'bg-white dark:bg-slate-800 text-gray-900 dark:text-white border-gray-300 dark:border-slate-600 hover:bg-gray-100 dark:hover:bg-slate-700'}">${r}</button>
                        `).join('')}
                        <button type="button" onclick="window.openModal('wicket')" class="col-span-4 h-16 bg-gradient-to-r from-red-600 to-red-800 text-white font-black text-xl rounded-xl shadow-[0_4px_15px_rgba(220,38,38,0.5)] active:scale-95 uppercase tracking-widest border border-red-900 touch-manipulation mt-1">${t.wicket}</button>
                        
                        <button type="button" onclick="window.openModal('extra', 'LB')" class="h-14 bg-yellow-50 dark:bg-slate-800 border border-yellow-300 dark:border-yellow-600/50 text-yellow-700 dark:text-yellow-500 font-bold rounded-xl active:scale-95 shadow-sm text-sm touch-manipulation">LB</button>
                        <button type="button" onclick="window.openModal('extra', 'BYE')" class="h-14 bg-yellow-50 dark:bg-slate-800 border border-yellow-300 dark:border-yellow-600/50 text-yellow-700 dark:text-yellow-500 font-bold rounded-xl active:scale-95 shadow-sm text-sm touch-manipulation">BYE</button>
                        <button type="button" onclick="window.openModal('extra', 'WD')" class="h-14 bg-yellow-50 dark:bg-slate-800 border border-yellow-300 dark:border-yellow-600/50 text-yellow-700 dark:text-yellow-500 font-bold rounded-xl active:scale-95 shadow-sm text-sm touch-manipulation">${t.wide || 'WD'}</button>
                        <button type="button" onclick="window.openModal('extra', 'NB')" class="h-14 bg-yellow-50 dark:bg-slate-800 border border-yellow-300 dark:border-yellow-600/50 text-yellow-700 dark:text-yellow-500 font-bold rounded-xl active:scale-95 shadow-sm text-sm touch-manipulation">${t.noBall || 'NB'}</button>
                    </div>

                    <!-- Bottom Actions -->
                    <div class="flex gap-2 mt-4">
                        <button type="button" onclick="window.undoAction()" ${!m.actions || m.actions.length === 0 || window.appState.isWaitingForNext ? 'disabled' : ''} class="flex-1 py-4 rounded-xl font-bold bg-gray-100 dark:bg-slate-800 border border-gray-300 dark:border-slate-700 text-gray-700 dark:text-slate-300 disabled:opacity-50 hover:bg-gray-200 dark:hover:bg-slate-700 active:scale-95 transition-all flex justify-center items-center gap-2 shadow-sm touch-manipulation">
                            <i class="fa-solid fa-clock-rotate-left text-lg"></i> ${t.undo}
                        </button>
                        <button type="button" onclick="window.openModal('end')" ${window.appState.isWaitingForNext ? 'disabled' : ''} class="flex-1 py-4 rounded-xl font-bold bg-red-100 dark:bg-red-900/40 border border-red-300 dark:border-red-800 text-red-700 dark:text-red-500 hover:bg-red-200 dark:hover:bg-red-900/60 active:scale-95 transition-all disabled:opacity-50 shadow-sm uppercase tracking-wider touch-manipulation">
                            ${t.endInnings || "End Innings"}
                        </button>
                    </div>
                </div>
            `;
        }

        // --- INNINGS BREAK VIEW ---
        window.renderInningsBreak = function(t, m) {
            return `
                <div class="flex-1 overflow-y-auto p-4">
                    <div class="max-w-2xl mx-auto mb-6 text-center pop-in mt-6">
                        <h2 class="text-3xl font-black text-blue-700 dark:text-blue-400 uppercase tracking-widest mb-2">${t.inningsComplete || "Innings Complete"}</h2>
                        <p class="text-base text-gray-700 dark:text-slate-300 mb-8">${t.target} for ${m.team2}: <strong class="text-gray-900 dark:text-white text-2xl ml-1">${m.score1.runs + 1}</strong> runs in ${m.overs * 6} balls</p>
                        
                        <button type="button" onclick="window.undoEndMatch()" class="mb-6 px-6 py-2 bg-gray-200 dark:bg-slate-800 text-gray-800 dark:text-white font-bold rounded-xl shadow-md border border-gray-300 dark:border-slate-700 hover:bg-gray-300 dark:hover:bg-slate-700 transition-colors"><i class="fa-solid fa-rotate-left"></i> ${t.undoMatch || "Undo Last Ball"}</button>

                        <button type="button" onclick="window.startInnings2()" class="text-white bg-blue-600 px-8 py-5 rounded-xl font-black hover:bg-blue-700 shadow-lg shadow-blue-600/30 transition-transform active:scale-95 touch-manipulation uppercase tracking-widest text-lg w-full">
                            ${t.startInnings2 || "Start 2nd Innings"}
                        </button>
                    </div>
                    <div class="opacity-90 pointer-events-none mt-10">
                        ${window.renderScorecardTables(m, t)}
                    </div>
                </div>
            `;
        };

        window.startInnings2 = () => {
            let m = window.appState.activeMatch;
            if (!m.actions) m.actions = [];
            m.actions.push({ isStartInnings2: true });
            window.rebuildMatchState();
            window.changeView('scoring');
        };

        // --- END VIEW ---
        window.renderEnd = function(t, m) {
            let res = t.tied;
            if (m.isSuperOver && m.matchStatus !== 'tie') res = `${m.matchStatus === 'team1_won' ? m.team1 : m.team2} ${t.wonBy} the ${m.tieBreakerInfo}`;
            else if (m.tieBreakerInfo && !m.isSuperOver) res = `${m.matchStatus === 'team1_won' ? m.team1 : m.team2} ${t.wonBy} ${m.tieBreakerInfo}`;
            else if (m.matchStatus === 'team1_won') res = `${m.team1} ${t.wonBy} ${m.score1.runs - m.score2.runs} runs`;
            else if (m.matchStatus === 'team2_won') {
                const target = m.revisedTarget ? m.revisedTarget : m.score1.runs + 1;
                const ballsLeft = (m.overs * 6) - m.score2.balls;
                res = `${m.team2} ${t.wonBy} ${10 - m.score2.wickets} wkts (${ballsLeft} balls left)`;
            }

            const s1 = m.isSuperOver ? m.mainScore1 : m.score1;
            const s2 = m.isSuperOver ? m.mainScore2 : m.score2;

            return `
                <div class="flex-1 overflow-y-auto">
                    <div class="w-full max-w-2xl mx-auto p-6 text-center pop-in">
                        <i class="fa-solid fa-trophy text-[80px] text-yellow-500 dark:text-yellow-400 mx-auto mb-4 drop-shadow-[0_0_15px_rgba(250,204,21,0.5)] block"></i>
                        <h1 class="text-3xl font-black text-gray-900 dark:text-white mb-2 uppercase">${t.matchOver}</h1>
                        <p class="text-xl text-blue-700 dark:text-blue-400 font-bold bg-blue-50 dark:bg-blue-900/30 p-3 rounded-xl border border-blue-200 dark:border-blue-500/30 mb-8 shadow-md dark:shadow-lg dark:shadow-blue-500/20">${res}</p>
                        
                        <button type="button" onclick="window.undoEndMatch()" class="mb-8 px-6 py-2 bg-gray-200 dark:bg-slate-800 text-gray-800 dark:text-white font-bold rounded-xl shadow-md border border-gray-300 dark:border-slate-700 hover:bg-gray-300 dark:hover:bg-slate-700 transition-colors"><i class="fa-solid fa-rotate-left"></i> ${t.undoMatch || "Undo Last Ball"}</button>

                        <div class="flex gap-4 mb-8">
                            <div class="flex-1 bg-white dark:bg-slate-900 p-4 rounded-2xl border border-gray-200 dark:border-slate-800 shadow-md">
                                <div class="text-xs text-gray-500 dark:text-slate-500 font-bold mb-1 uppercase tracking-widest">${m.team1}</div>
                                <div class="text-2xl font-black text-gray-900 dark:text-white">${s1.runs}/${s1.wickets}</div>
                                <div class="text-xs text-gray-500 dark:text-slate-500 mt-1 font-bold">(${window.fmtOvers(s1.balls)} Overs)</div>
                            </div>
                            <div class="flex-1 bg-white dark:bg-slate-900 p-4 rounded-2xl border border-gray-200 dark:border-slate-800 shadow-md">
                                <div class="text-xs text-gray-500 dark:text-slate-500 font-bold mb-1 uppercase tracking-widest">${m.team2}</div>
                                <div class="text-2xl font-black text-gray-900 dark:text-white">${s2.runs}/${s2.wickets}</div>
                                <div class="text-xs text-gray-500 dark:text-slate-500 mt-1 font-bold">(${window.fmtOvers(s2.balls)} Overs)</div>
                            </div>
                        </div>

                        ${m.matchStatus === 'tie' ? `
                            <div class="mb-10 bg-white dark:bg-slate-900 border border-yellow-300 dark:border-yellow-600/50 rounded-2xl p-5 pop-in shadow-xl shadow-yellow-500/10">
                                <h3 class="text-yellow-600 dark:text-yellow-500 font-black mb-2 uppercase tracking-widest flex items-center justify-center gap-2"><i class="fa-solid fa-triangle-exclamation text-lg"></i> ${t.resolveTie || "Resolve Tie"}</h3>
                                <p class="text-gray-500 dark:text-slate-400 text-sm mb-4 font-bold">Start a new mini-match to decide the winner:</p>
                                <div class="flex gap-2">
                                    <button type="button" onclick="window.triggerTieBreaker('Super Over')" class="flex-1 py-4 bg-yellow-100 dark:bg-yellow-600/20 border border-yellow-400 dark:border-yellow-500 text-yellow-700 dark:text-yellow-400 font-black rounded-xl hover:bg-yellow-200 dark:hover:bg-yellow-600/40 transition-colors shadow-[0_0_15px_rgba(202,138,4,0.3)] uppercase tracking-wider touch-manipulation">${t.startSuperOver || "Start Super Over"}</button>
                                    <button type="button" onclick="window.triggerTieBreaker('Bowl Out')" class="flex-1 py-4 bg-gray-100 dark:bg-slate-800 border border-gray-300 dark:border-slate-700 text-gray-800 dark:text-white font-black rounded-xl hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors uppercase tracking-wider touch-manipulation">${t.startBowlOut || "Start Bowl Out"}</button>
                                </div>
                            </div>
                        ` : ''}

                        <div class="space-y-3 mb-10">
                            <button type="button" onclick="window.shareMatch()" class="w-full text-white bg-blue-600 font-bold py-4 rounded-xl flex items-center justify-center gap-2 hover:bg-blue-700 shadow-md touch-manipulation"><i class="fa-solid fa-share-nodes text-lg"></i> ${t.share}</button>
                            <button type="button" onclick="window.downloadPDF()" class="w-full bg-gray-100 dark:bg-slate-800 text-gray-800 dark:text-white font-bold py-4 rounded-xl flex items-center justify-center gap-2 hover:bg-gray-200 dark:hover:bg-slate-700 border border-gray-300 dark:border-slate-700 shadow-sm touch-manipulation"><i class="fa-solid fa-download text-lg"></i> ${t.print}</button>
                            <button type="button" onclick="window.clearActiveMatch()" class="w-full bg-white dark:bg-slate-900 border border-gray-300 dark:border-slate-800 text-gray-800 dark:text-white font-black py-4 rounded-xl flex items-center justify-center hover:bg-gray-50 dark:bg-slate-800 shadow-sm touch-manipulation uppercase tracking-widest mt-6">${t.setup || "New Match"}</button>
                        </div>

                        <div class="text-left bg-white dark:bg-slate-900 p-4 sm:p-6 rounded-2xl border border-gray-200 dark:border-slate-800 shadow-2xl">
                            ${window.renderScorecardTables(m, t)}
                        </div>
                    </div>
                </div>
            `;
        };

        window.triggerTieBreaker = (type) => {
            let oldMatch = window.appState.activeMatch;
            const m = JSON.parse(JSON.stringify(oldMatch));
            if (!m.isSuperOver) { m.mainScore1 = m.score1; m.mainScore2 = m.score2; }
            m.score1 = window.INITIAL_INNINGS(dict[window.appState.lang], false); 
            m.score2 = window.INITIAL_INNINGS(dict[window.appState.lang], true);
            m.innings = 1; m.overs = 1; m.matchStatus = 'playing'; m.isSuperOver = true; m.tieBreakerInfo = type; m.actions = [];
            window.saveMatch(m); window.changeView('toss');
        };

        window.clearActiveMatch = () => { localStorage.removeItem(getActiveKey()); window.appState.activeMatch = null; window.appState.view = 'setup'; window.clearSetup(); };

        // --- HISTORY & PERFORMANCE ---
        window.renderHistory = function(t) {
            if (window.appState.selectedHistoryMatch) {
                return `
                    <div class="flex-1 overflow-y-auto p-4">
                        ${window.renderScorecardTables(window.appState.selectedHistoryMatch, t)}
                        <div class="max-w-2xl mx-auto flex gap-2 pb-10 mt-4">
                            <button type="button" onclick="window.shareMatch()" class="flex-1 py-4 text-white bg-blue-600 rounded-xl font-bold flex justify-center items-center gap-2 shadow-md hover:bg-blue-700 touch-manipulation"><i class="fa-solid fa-share-nodes text-lg"></i> ${t.share}</button>
                            <button type="button" onclick="window.downloadPDF()" class="flex-1 py-4 text-white bg-green-600 rounded-xl font-bold flex justify-center items-center gap-2 shadow-md hover:bg-green-700 touch-manipulation"><i class="fa-solid fa-download text-lg"></i> PDF</button>
                        </div>
                    </div>
                `;
            }

            let listHtml = window.appState.matches.length === 0 ? `<p class="text-center text-gray-500 dark:text-slate-500 mt-10 font-bold">${t.noMatches || "No matches found."}</p>` : '';
            window.appState.matches.forEach(m => {
                const s1 = m.isSuperOver ? m.mainScore1 : m.score1;
                const s2 = m.isSuperOver ? m.mainScore2 : m.score2;
                listHtml += `
                    <div onclick="window.selectHistoryMatch('${m.id}')" class="bg-white dark:bg-slate-900 border border-gray-300 dark:border-slate-800 rounded-xl p-5 flex flex-col gap-3 shadow-md dark:shadow-lg cursor-pointer hover:border-gray-400 dark:hover:border-slate-600 transition-colors touch-manipulation">
                        <div class="flex items-center justify-between">
                            <div>
                                <div class="font-bold text-lg text-gray-900 dark:text-white">${m.team1} <span class="text-sm font-normal text-gray-400 dark:text-slate-500">v</span> ${m.team2}</div>
                                <div class="text-xs text-gray-500 dark:text-slate-500 mt-1 font-bold">${window.formatDateStr(m.createdAt)} &bull; ${(m.matchStatus === 'playing' || m.matchStatus === 'innings_break') ? `<span class="text-yellow-600 dark:text-yellow-500">${t.ongoing || "Ongoing"}</span>` : `<span class="text-green-600 dark:text-green-500">${t.complete || "Complete"}</span>`}</div>
                            </div>
                            <div class="text-right">
                                ${s1 ? `<div class="font-black text-xl text-gray-900 dark:text-white">${s1.runs}/${s1.wickets}</div>` : ''}
                                ${s2 && (m.innings === 2 || (m.matchStatus !== 'playing' && m.matchStatus !== 'innings_break')) ? `<div class="font-bold text-sm text-gray-600 dark:text-slate-400">${s2.runs}/${s2.wickets}</div>` : ''}
                            </div>
                        </div>
                        ${m.tieBreakerInfo ? `<div class="text-[10px] text-yellow-700 dark:text-yellow-500 font-bold uppercase tracking-widest bg-yellow-50 dark:bg-yellow-600/10 inline-block px-2 py-1 rounded border border-yellow-300 dark:border-yellow-500/20 w-fit">Resolved via ${m.tieBreakerInfo}</div>` : ''}
                        
                        <div class="flex gap-2 justify-end border-t border-gray-200 dark:border-slate-800 pt-3 mt-1" onclick="event.stopPropagation()">
                            ${(m.matchStatus === 'playing' || m.matchStatus === 'innings_break') ? `
                                <button type="button" onclick="window.resumeMatchId('${m.id}')" class="px-3 py-2 bg-blue-50 dark:bg-blue-600/20 text-blue-700 dark:text-blue-400 rounded-lg flex items-center gap-1 text-sm font-bold border border-blue-200 dark:border-transparent hover:bg-blue-100 dark:hover:bg-blue-600/30 touch-manipulation"><i class="fa-solid fa-play"></i> ${t.resumeMatch || "Resume"}</button>
                            ` : `
                                <button type="button" onclick="window.selectHistoryMatch('${m.id}'); setTimeout(() => window.shareMatch(), 100);" class="px-3 py-2 bg-blue-50 dark:bg-blue-600/20 text-blue-700 dark:text-blue-400 rounded-lg flex items-center gap-1 text-sm font-bold border border-blue-200 dark:border-transparent hover:bg-blue-100 dark:hover:bg-blue-600/30 touch-manipulation"><i class="fa-solid fa-share-nodes"></i> ${t.share.replace(' PDF', '') || "Share"}</button>
                                <button type="button" onclick="window.selectHistoryMatch('${m.id}'); setTimeout(() => window.downloadPDF(), 100);" class="px-3 py-2 bg-green-50 dark:bg-green-600/20 text-green-700 dark:text-green-400 rounded-lg flex items-center gap-1 text-sm font-bold border border-green-200 dark:border-transparent hover:bg-green-100 dark:hover:bg-green-600/30 touch-manipulation"><i class="fa-solid fa-download"></i> PDF</button>
                            `}
                            <button type="button" onclick="window.deleteMatch('${m.id}')" class="px-3 py-2 bg-red-50 dark:bg-red-600/20 text-red-700 dark:text-red-400 rounded-lg flex items-center gap-1 text-sm font-bold border border-red-200 dark:border-transparent hover:bg-red-100 dark:hover:bg-red-600/30 touch-manipulation"><i class="fa-solid fa-trash-can"></i> ${t.delete || "Delete"}</button>
                        </div>
                    </div>
                `;
            });

            return `<div class="flex-1 p-4 overflow-y-auto space-y-3 max-w-2xl mx-auto w-full pb-10">${listHtml}</div>`;
        };

        window.selectHistoryMatch = (id) => { window.appState.selectedHistoryMatch = window.appState.matches.find(x=>x.id===id); window.renderApp(); };
        window.resumeMatchId = (id) => { 
            const m = window.appState.matches.find(x=>x.id===id); 
            if(m) { window.saveMatch(m); window.changeView(m.matchStatus === 'innings_break' ? 'innings_break' : m.matchStatus === 'playing' ? 'scoring' : 'end'); }
        };
        window.deleteMatch = (id) => { window.appState.matches = window.appState.matches.filter(x=>x.id!==id); try{localStorage.setItem(getStorageKey(), JSON.stringify(window.appState.matches))}catch(e){} window.renderApp(); };

        window.toggleAwardsEdit = () => { window.appState.isEditingAwards = !window.appState.isEditingAwards; window.renderApp(); };
        
        window.saveCustomAward = (key, field, val, autoName, autoVal) => {
            if(!window.appState.customAwards) window.appState.customAwards = {};
            if(!window.appState.customAwards[key]) window.appState.customAwards[key] = {name: autoName, val: autoVal};
            window.appState.customAwards[key][field] = val;
            localStorage.setItem('cricscore_icc_custom_awards', JSON.stringify(window.appState.customAwards));
        };
        
        window.resetCustomAward = (key) => {
            if(window.appState.customAwards) {
                delete window.appState.customAwards[key];
                localStorage.setItem('cricscore_icc_custom_awards', JSON.stringify(window.appState.customAwards));
                window.renderApp();
            }
        };

        window.renderPerformance = function(t) {
            const p = {};
            const getP = (name) => { if(!p[name]) p[name] = { name, runs: 0, wickets: 0, catches: 0, fours: 0, sixes: 0, hatTricks: 0 }; return p[name]; };

            const completed = window.appState.matches.filter(m => m.matchStatus !== 'playing' && m.matchStatus !== 'innings_break' && !m.isSetup);
            
            completed.forEach(m => {
                const inningsToProcess = m.isSuperOver ? [m.mainScore1, m.mainScore2, m.score1, m.score2] : [m.score1, m.score2];
                inningsToProcess.forEach((sc, idx) => {
                    if(!sc || !sc.allBatters) return;
                    const batTeam = idx === 0 ? m.team1 : m.team2;
                    const bowlTeam = idx === 0 ? m.team2 : m.team1;

                    sc.allBatters.forEach(b => {
                        const uniqueName = b.name + ' (' + batTeam + ')';
                        const pStat = getP(uniqueName);
                        pStat.runs += b.runs; pStat.fours += b.fours; pStat.sixes += b.sixes;
                        if (b.isOut && b.fielder && b.dismissalType === 'Caught') {
                           getP(b.fielder + ' (' + bowlTeam + ')').catches += 1;
                        }
                    });
                    sc.allBowlers.forEach(b => { 
                        getP(b.name + ' (' + bowlTeam + ')').wickets += b.wickets; 
                    });
                    
                    const allBalls = [...sc.previousOvers.flatMap(o=>o.log), ...sc.currentOverLog];
                    let wStreak = 0; let currentB = '';
                    allBalls.forEach(b => {
                        if (b.actIsWicket && b.label && !b.label.includes('RO')) { 
                            const uniqueB = b.bowlerName + ' (' + bowlTeam + ')';
                            if (uniqueB === currentB) { 
                                wStreak++; if(wStreak === 3) { getP(uniqueB).hatTricks += 1; wStreak = 0; } 
                            } 
                            else { currentB = uniqueB; wStreak = 1; }
                        } else if (b.isLegal || b.extraType === 'WD' || b.extraType === 'NB') { wStreak = 0; }
                    });
                });
            });

            const players = Object.values(p);
            const stats = {
               runs: [...players].sort((a,b) => b.runs - a.runs).filter(x=>x.runs > 0).slice(0, 5),
               wickets: [...players].sort((a,b) => b.wickets - a.wickets).filter(x=>x.wickets > 0).slice(0, 5),
               catches: [...players].sort((a,b) => b.catches - a.catches).filter(x=>x.catches > 0).slice(0, 5),
               fours: [...players].sort((a,b) => b.fours - a.fours).filter(x=>x.fours > 0).slice(0, 5),
               sixes: [...players].sort((a,b) => b.sixes - a.sixes).filter(x=>x.sixes > 0).slice(0, 5),
               hatTricks: [...players].sort((a,b) => b.hatTricks - a.hatTricks).filter(x=>x.hatTricks > 0).slice(0, 5),
            };

            const isEdit = window.appState.isEditingAwards;
            const custom = window.appState.customAwards || {};

            const genCard = (title, data, valKey, icon, colorClass) => {
               const customData = custom[valKey] || {};
               const defaultName = data[0] ? data[0].name : '';
               const defaultVal = data[0] ? data[0][valKey] : '';
               
               const dispName = customData.name !== undefined ? customData.name : defaultName;
               const dispVal = customData.val !== undefined ? customData.val : defaultVal;
               
               let content = '';
               if (isEdit) {
                   content = `
                      <div class="space-y-2 mt-4 border-t border-gray-200 dark:border-slate-700 pt-4">
                         <input oninput="window.saveCustomAward('${valKey}', 'name', this.value, '${defaultName.replace(/'/g, "\\'")}', '${defaultVal}')" value="${dispName}" placeholder="Player Name (Team)" class="w-full bg-gray-50 dark:bg-slate-950 border border-gray-300 dark:border-slate-700 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500 font-bold text-gray-900 dark:text-white" />
                         <input oninput="window.saveCustomAward('${valKey}', 'val', this.value, '${defaultName.replace(/'/g, "\\'")}', '${defaultVal}')" value="${dispVal}" placeholder="Score/Stat" class="w-full bg-gray-50 dark:bg-slate-950 border border-gray-300 dark:border-slate-700 rounded-lg px-3 py-2 text-sm outline-none focus:border-blue-500 font-bold text-gray-900 dark:text-white" />
                         ${(customData.name !== undefined || customData.val !== undefined) ? `<button type="button" onclick="window.resetCustomAward('${valKey}')" class="text-xs text-red-500 font-bold mt-2 hover:underline">Reset to Auto</button>` : ''}
                      </div>
                   `;
               } else {
                   if (dispName) {
                       content = `
                          <div class="flex items-center justify-between mt-2">
                             <div class="flex items-center gap-3">
                                <span class="w-6 h-6 flex items-center justify-center rounded-full text-xs font-black bg-yellow-100 text-yellow-600 dark:bg-yellow-900/30 dark:text-yellow-500">1</span>
                                <span class="text-base font-bold text-gray-900 dark:text-white">${dispName}</span>
                             </div>
                             <span class="text-xl font-black ${colorClass}">${dispVal}</span>
                          </div>
                       `;
                   } else {
                       content = `<div class="text-gray-400 dark:text-slate-600 text-sm font-bold text-center py-6 italic">${t.noData || "No data available"}</div>`;
                   }
               }

               return `
                <div class="bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-2xl p-5 shadow-lg pop-in">
                   <div class="flex items-center gap-2 mb-2 pb-3 border-b border-gray-200 dark:border-slate-800 font-black tracking-wide ${colorClass}">
                      <i class="${icon} text-lg"></i> ${title}
                   </div>
                   ${content}
                </div>
               `;
            };

            return `
              <div class="flex-1 p-4 overflow-y-auto space-y-5 max-w-5xl mx-auto w-full pb-10">
                <div class="text-center mb-6 pop-in mt-4 relative">
                   <button type="button" onclick="window.toggleAwardsEdit()" class="absolute top-0 right-0 px-4 py-2 bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 text-xs font-bold rounded-lg hover:bg-blue-200 dark:hover:bg-blue-800/30 transition-colors">
                      <i class="fa-solid ${isEdit ? 'fa-check' : 'fa-pen'}"></i> ${isEdit ? (t.saveAwards || "Save Awards") : (t.editAwards || "Edit Awards")}
                   </button>
                   <i class="fa-solid fa-star text-[64px] text-yellow-500 mx-auto mb-3 drop-shadow-[0_0_15px_rgba(234,179,8,0.5)] block"></i>
                   <h2 class="text-3xl font-black uppercase tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-yellow-500 to-yellow-600">${t.leaderboard || "Tournament Leaderboard"}</h2>
                   <p class="text-sm text-gray-500 dark:text-slate-400 mt-2 font-bold uppercase tracking-widest">${t.statsSubtitle || "Aggregated stats from all completed matches"}</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                  ${genCard(t.highRuns || "Highest Run Scorers", stats.runs, "runs", "fa-solid fa-trophy", "text-blue-600 dark:text-blue-400")}
                  ${genCard(t.highWickets || "Highest Wicket Takers", stats.wickets, "wickets", "fa-solid fa-trophy", "text-red-600 dark:text-red-400")}
                  ${genCard(t.mostCatches || "Most Catches", stats.catches, "catches", "fa-solid fa-award", "text-green-600 dark:text-green-400")}
                  ${genCard(t.mostSixes || "Most Sixes", stats.sixes, "sixes", "fa-solid fa-star", "text-purple-600 dark:text-purple-400")}
                  ${genCard(t.mostFours || "Most Fours", stats.fours, "fours", "fa-solid fa-star", "text-cyan-600 dark:text-cyan-400")}
                  ${genCard(t.hatTricks || "Hat-Tricks", stats.hatTricks, "hatTricks", "fa-solid fa-triangle-exclamation", "text-yellow-600 dark:text-yellow-400")}
                </div>
              </div>
            `;
        };

        window.renderScorecardTables = function(match, t) {
            const matchSets = match.isSuperOver ? [ { s1: match.mainScore1, s2: match.mainScore2, label: 'MAIN MATCH' }, { s1: match.score1, s2: match.score2, label: match.tieBreakerInfo?.toUpperCase() || 'TIE BREAKER' } ] : [ { s1: match.score1, s2: match.score2, label: '' } ];
            let html = '';
            
            matchSets.forEach((mSet) => {
                if (mSet.label) html += `<div class="text-center font-black text-gray-800 dark:text-slate-300 tracking-widest uppercase my-6 border-b border-gray-300 dark:border-slate-800 pb-2">${mSet.label}</div>`;
                
                [mSet.s1, mSet.s2].forEach((sc, i) => {
                    if (!sc || !(i === 0 || match.innings === 2 || match.matchStatus !== 'playing')) return;
                    const team = i === 0 ? match.team1 : match.team2;
                    const innPrefix = i === 0 ? '1st ' : '2nd ';
                    
                    html += `
                        <div class="mb-8">
                            <div class="bg-blue-100 dark:bg-blue-900/30 p-3 flex justify-between items-center font-bold border-l-4 border-blue-600 dark:border-blue-500 mb-3 rounded-r-lg text-gray-900 dark:text-white">
                                <span class="uppercase tracking-wide">${innPrefix}INNINGS - ${team}</span>
                                <span>${sc.runs}/${sc.wickets} (${window.fmtOvers(sc.balls)})</span>
                            </div>
                            <table class="w-full text-sm mb-4 border-collapse text-gray-900 dark:text-slate-200">
                                <thead><tr class="bg-gray-200 dark:bg-slate-800/50 text-left text-gray-700 dark:text-slate-300"><th class="p-2 border-b border-gray-300 dark:border-slate-700">${t.batsmen || 'Batsmen'}</th><th class="p-2 border-b border-gray-300 dark:border-slate-700 w-8 text-right">R</th><th class="p-2 border-b border-gray-300 dark:border-slate-700 w-8 text-right">B</th><th class="p-2 border-b border-gray-300 dark:border-slate-700 w-8 text-right">4s</th><th class="p-2 border-b border-gray-300 dark:border-slate-700 w-8 text-right">6s</th><th class="p-2 border-b border-gray-300 dark:border-slate-700 w-12 text-right">SR</th></tr></thead>
                                <tbody>
                                    ${sc.allBatters.map((b, j) => {
                                        if (b.balls === 0 && !b.isOut && j > 1 && match.matchStatus === 'playing') return '';
                                        return `<tr class="border-b border-gray-200 dark:border-slate-800/50">
                                            <td class="p-2"><div class="font-bold text-gray-900 dark:text-white">${b.name}</div><div class="text-[10px] text-gray-600 dark:text-slate-400 mt-0.5 tracking-wide uppercase font-medium">${b.isOut ? (b.dismissal || '(out)') : 'not out'}</div></td>
                                            <td class="p-2 font-bold text-right align-top">${b.runs}</td><td class="p-2 text-gray-600 dark:text-slate-400 text-right align-top">${b.balls}</td><td class="p-2 text-right align-top">${b.fours}</td><td class="p-2 text-right align-top">${b.sixes}</td><td class="p-2 text-right align-top">${window.calcSR(b.runs, b.balls)}</td>
                                        </tr>`;
                                    }).join('')}
                                </tbody>
                            </table>
                            <div class="text-xs text-gray-600 dark:text-slate-400 mb-6 px-2 font-bold">Extras: <b class="text-gray-900 dark:text-white">${sc.extras}</b> (WD: ${sc.wides}, NB: ${sc.noBalls})</div>

                            <table class="w-full text-sm border-collapse text-gray-900 dark:text-slate-200">
                                <thead><tr class="bg-gray-200 dark:bg-slate-800/50 text-left text-gray-700 dark:text-slate-300"><th class="p-2 border-b border-gray-300 dark:border-slate-700">${t.bowler || 'Bowler'}</th><th class="p-2 border-b border-gray-300 dark:border-slate-700 w-10 text-right">O</th><th class="p-2 border-b border-gray-300 dark:border-slate-700 w-10 text-right">R</th><th class="p-2 border-b border-gray-300 dark:border-slate-700 w-10 text-right">W</th><th class="p-2 border-b border-gray-300 dark:border-slate-700 w-12 text-right">Eco</th></tr></thead>
                                <tbody>
                                    ${sc.allBowlers.map((b, j) => {
                                        if (b.balls === 0 && b.runs === 0 && match.matchStatus === 'playing') return '';
                                        return `<tr class="border-b border-gray-200 dark:border-slate-800/50"><td class="p-2 font-bold text-gray-900 dark:text-white">${b.name}</td><td class="p-2 text-right">${window.fmtOvers(b.balls)}</td><td class="p-2 text-right font-bold">${b.runs}</td><td class="p-2 font-black text-red-600 dark:text-red-400 text-right">${b.wickets}</td><td class="p-2 text-right font-medium">${window.calcEco(b.runs, b.balls)}</td></tr>`;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                });
            });
            return html;
        };

        // --- MODALS RENDERER ---
        window.renderModal = function(t) {
            const m = window.appState.activeMatch;
            const mo = window.appState.modal;

            if (mo.type === 'edit_ball_keypad') {
                return `
                    <div class="fixed inset-0 bg-black/90 flex flex-col items-center justify-center p-4 z-50 pop-in backdrop-blur-sm modal-backdrop">
                        <div class="bg-white dark:bg-slate-900 border border-gray-300 dark:border-slate-700 p-6 rounded-3xl w-full max-w-sm shadow-2xl">
                            <div class="flex justify-between items-center mb-6 border-b border-gray-200 dark:border-slate-800 pb-3">
                                <h3 class="font-black text-xl text-blue-600 dark:text-blue-500 uppercase tracking-widest"><i class="fa-solid fa-pen"></i> ${t.editBall || "Edit Ball"}</h3>
                                <button type="button" onclick="window.appState.editTargetGlobalIndex=null; window.closeModal();" class="text-gray-500 hover:text-red-500 touch-manipulation"><i class="fa-solid fa-xmark text-2xl"></i></button>
                            </div>
                            
                            <button type="button" onclick="window.finishEditBallDelete()" class="w-full mb-5 py-3 bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400 font-black rounded-xl border border-red-300 dark:border-red-800 hover:bg-red-200 dark:hover:bg-red-900/50 uppercase tracking-widest touch-manipulation shadow-sm"><i class="fa-solid fa-trash-can"></i> ${t.deleteBall || "Delete Ball Entirely"}</button>

                            <p class="text-xs font-bold text-gray-500 dark:text-slate-400 text-center mb-3">${t.overwriteOutcome || "Or overwrite outcome:"}</p>

                            <div class="grid grid-cols-4 gap-2">
                                ${[0,1,2,3,4,5,6].map(r => `
                                    <button type="button" onclick="window.submitEditOrRun(${r})" class="h-16 rounded-xl font-black text-2xl transition-transform active:scale-95 shadow-md border touch-manipulation ${r===6 ? 'text-white bg-blue-600 border-blue-700 shadow-[0_0_15px_rgba(37,99,235,0.4)]' : r===4 ? 'text-white bg-blue-500 border-blue-600 shadow-[0_0_10px_rgba(59,130,246,0.4)]' : r===5 ? 'text-white bg-purple-600 border-purple-700 shadow-[0_0_10px_rgba(147,51,234,0.4)]' : r===0 ? 'bg-gray-100 dark:bg-slate-800 text-gray-600 dark:text-slate-400 border-gray-300 dark:border-slate-700 hover:bg-gray-200 dark:hover:bg-slate-700' : 'bg-white dark:bg-slate-800 text-gray-900 dark:text-white border-gray-300 dark:border-slate-600 hover:bg-gray-100 dark:hover:bg-slate-700'}">${r}</button>
                                `).join('')}
                                <button type="button" onclick="window.openModal('wicket')" class="col-span-4 h-16 bg-gradient-to-r from-red-600 to-red-800 text-white font-black text-xl rounded-xl shadow-md active:scale-95 uppercase tracking-widest border border-red-900 touch-manipulation mt-1">${t.wicket}</button>
                                
                                <button type="button" onclick="window.openModal('extra', 'LB')" class="h-14 bg-yellow-50 dark:bg-slate-800 border border-yellow-300 dark:border-yellow-600/50 text-yellow-700 dark:text-yellow-500 font-bold rounded-xl active:scale-95 shadow-sm text-sm touch-manipulation">LB</button>
                                <button type="button" onclick="window.openModal('extra', 'BYE')" class="h-14 bg-yellow-50 dark:bg-slate-800 border border-yellow-300 dark:border-yellow-600/50 text-yellow-700 dark:text-yellow-500 font-bold rounded-xl active:scale-95 shadow-sm text-sm touch-manipulation">BYE</button>
                                <button type="button" onclick="window.openModal('extra', 'WD')" class="h-14 bg-yellow-50 dark:bg-slate-800 border border-yellow-300 dark:border-yellow-600/50 text-yellow-700 dark:text-yellow-500 font-bold rounded-xl active:scale-95 shadow-sm text-sm touch-manipulation">${t.wide || 'WD'}</button>
                                <button type="button" onclick="window.openModal('extra', 'NB')" class="h-14 bg-yellow-50 dark:bg-slate-800 border border-yellow-300 dark:border-yellow-600/50 text-yellow-700 dark:text-yellow-500 font-bold rounded-xl active:scale-95 shadow-sm text-sm touch-manipulation">${t.noBall || 'NB'}</button>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            if (mo.type === 'bowler') {
                const sc = m.innings === 1 ? m.score1 : m.score2;
                const isMidOver = mo.arg1 === 1;
                return `

                    <div class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 pop-in backdrop-blur-sm modal-backdrop">
                      <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl w-full max-w-sm border border-gray-300 dark:border-slate-700 shadow-2xl">
                        <h3 class="font-black mb-4 text-green-600 dark:text-green-500 text-xl tracking-wide">${isMidOver ? (t.changeBowler || 'Change Bowler') : (t.selectBowler || 'Select Next Bowler')}</h3>
                        <div class="flex flex-wrap gap-2 mb-5 max-h-32 overflow-y-auto custom-scroll pr-2">
                          ${sc.allBowlers.filter(b=>b.name !== sc.bowler.name).map((b) => `<button type="button" onclick="window.submitNextBowler('${b.name}', ${isMidOver})" class="px-4 py-3 bg-gray-100 dark:bg-slate-800 rounded-xl text-sm font-bold border border-gray-300 dark:border-slate-600 hover:bg-gray-200 dark:hover:bg-slate-700 text-gray-900 dark:text-white transition-colors touch-manipulation">${b.name}</button>`).join('')}
                        </div>
                        <form onsubmit="event.preventDefault(); window.submitNextBowler(document.getElementById('new-bowler-input').value, ${isMidOver});">
                          <label class="text-[10px] text-gray-500 dark:text-slate-400 font-bold uppercase tracking-widest mb-2 block">${t.newBowler || 'New Bowler Name'}</label>
                          <input id="new-bowler-input" placeholder="Enter name..." class="w-full bg-gray-50 dark:bg-slate-950 p-4 rounded-xl border border-gray-300 dark:border-slate-700 mb-4 text-gray-900 dark:text-white font-bold outline-none focus:border-blue-600 shadow-inner" autofocus/>
                          <div class="flex gap-2 mt-2">
                            ${isMidOver ? `<button type="button" onclick="window.closeModal()" class="flex-1 bg-gray-200 dark:bg-slate-800 py-4 rounded-xl font-bold hover:bg-gray-300 dark:hover:bg-slate-700 text-gray-900 dark:text-white touch-manipulation">${t.cancel || 'Cancel'}</button>` : ''}
                            <button type="submit" class="flex-1 w-full bg-blue-600 py-4 rounded-xl font-black hover:bg-blue-700 shadow-lg shadow-blue-600/30 text-white uppercase tracking-wider touch-manipulation">${t.confirm || 'Confirm'}</button>
                          </div>
                        </form>
                      </div>
                    </div>
                `;
            }

            if (mo.type === 'editOvers') {
                const currentMaxBalls = Math.max(m.score1.balls, m.score2.balls);
                const minAllowedOvers = Math.floor(currentMaxBalls / 6) + (currentMaxBalls % 6 > 0 ? 1 : 0);
                return `
                    <div class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 pop-in modal-backdrop">
                      <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl w-full max-w-sm border border-gray-300 dark:border-slate-700">
                        <h3 class="font-bold mb-2 text-gray-900 dark:text-white text-lg">${t.editOvers || 'Edit Match Overs'}</h3>
                        <p class="text-xs text-gray-500 dark:text-slate-400 mb-4">You cannot reduce overs below what has already been bowled.</p>
                        <form onsubmit="event.preventDefault(); window.submitEditOvers(parseInt(document.getElementById('edit-overs-input').value), document.getElementById('edit-overs-dls')?.checked || false);">
                          <input id="edit-overs-input" type="number" value="${m.overs}" min="${minAllowedOvers}" class="w-full bg-gray-50 dark:bg-slate-950 p-4 rounded-xl border border-gray-300 dark:border-slate-800 mb-4 text-gray-900 dark:text-white outline-none focus:border-blue-500 font-bold" autofocus/>
                          
                          ${m.innings === 2 ? `
                             <label class="flex items-center gap-3 mb-5 text-sm text-yellow-600 dark:text-yellow-400 bg-yellow-50 dark:bg-yellow-900/10 p-3 rounded-lg border border-yellow-200 dark:border-yellow-600/30 cursor-pointer touch-manipulation">
                                <input id="edit-overs-dls" type="checkbox" checked class="w-5 h-5 rounded" />
                                <div>
                                   <div class="font-bold">Apply DLS Method?</div>
                                   <div class="text-[10px] text-gray-500 dark:text-slate-300">Recalculates target based on 1st innings score at this over limit.</div>
                                </div>
                             </label>
                          ` : ''}

                          <div class="flex gap-2">
                            <button type="button" onclick="window.closeModal()" class="flex-1 bg-gray-200 dark:bg-slate-800 text-gray-800 dark:text-white py-4 rounded-xl font-bold hover:bg-gray-300 dark:hover:bg-slate-700 touch-manipulation">${t.cancel || 'Cancel'}</button>
                            <button type="submit" class="flex-1 text-white bg-blue-600 py-4 rounded-xl font-bold hover:bg-blue-500 shadow-lg shadow-blue-600/20 touch-manipulation">${t.save || 'Save'}</button>
                          </div>
                        </form>
                      </div>
                    </div>
                `;
            }

            if (mo.type === 'editName') {
                const role = mo.arg1;
                const sc = m.innings === 1 ? m.score1 : m.score2;
                let currentName = '';
                if(role === 'striker') currentName = sc.striker === 1 ? sc.batter1.name : sc.batter2.name;
                else if(role === 'nonStriker') currentName = sc.striker === 1 ? sc.batter2.name : sc.batter1.name;
                else if(role === 'bowler') currentName = sc.bowler.name;

                return `
                    <div class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 pop-in backdrop-blur-sm modal-backdrop">
                      <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl w-full max-w-sm border border-gray-300 dark:border-slate-700 shadow-2xl">
                        <h3 class="font-bold mb-4 text-gray-900 dark:text-white text-lg">${t.editPlayer || 'Edit Player Name'}</h3>
                        <form onsubmit="event.preventDefault(); window.submitEditName('${mo.arg1}', '${currentName}', document.getElementById('edit-player-name-input').value);">
                          <input id="edit-player-name-input" value="${currentName}" class="w-full bg-gray-50 dark:bg-slate-950 p-4 rounded-xl border border-gray-300 dark:border-slate-800 mb-4 text-gray-900 dark:text-white outline-none focus:border-blue-600 font-bold shadow-inner" autofocus/>
                          <div class="flex gap-2">
                            <button type="button" onclick="window.closeModal()" class="flex-1 bg-gray-200 dark:bg-slate-800 text-gray-800 dark:text-white py-4 rounded-xl font-bold hover:bg-gray-300 dark:hover:bg-slate-700 touch-manipulation">${t.cancel || 'Cancel'}</button>
                            <button type="submit" class="flex-1 text-white bg-blue-600 py-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-600/30 touch-manipulation tracking-wide">${t.save || 'Save'}</button>
                          </div>
                        </form>
                      </div>
                    </div>
                `;
            }

            if (mo.type === 'extra') {
                const ms = window.appState.modalState;
                const titleStr = mo.arg1 === 'WD' ? (t.wide || 'Wide') : mo.arg1 === 'NB' ? (t.noBall || 'No Ball') : mo.arg1 === 'LB' ? 'Leg Bye' : 'Bye';
                const isRunOnly = mo.arg1 === 'LB' || mo.arg1 === 'BYE';
                const isNB = mo.arg1 === 'NB';
                
                return `
                    <div class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 pop-in backdrop-blur-sm modal-backdrop" id="extra-modal-root" data-runs="0" data-wkt="" data-roruns="0">
                      <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl w-full max-w-sm border border-gray-300 dark:border-slate-700 text-gray-900 dark:text-white shadow-2xl">
                        <h3 class="font-bold mb-4 text-xl flex items-center gap-2">
                          <i class="fa-solid fa-triangle-exclamation text-yellow-600 dark:text-yellow-500"></i> ${titleStr} Options
                        </h3>
                        
                        <div class="mb-6 bg-gray-50 dark:bg-slate-800/50 p-3 rounded-xl border border-gray-200 dark:border-slate-800 shadow-inner">
                          <label class="text-[10px] text-gray-600 dark:text-slate-400 font-bold uppercase mb-3 block tracking-widest">${isRunOnly ? 'Runs Scored' : 'Additional Runs'}</label>
                          <div class="grid grid-cols-4 gap-2" id="extra-run-btns">
                            ${[0,1,2,3,4,5,6].map(r => {
                                if (isRunOnly && r === 0) return '';
                                return `<button type="button" data-val="${r}" onclick="window.selectExtraRun(${r})" class="extra-run-btn py-4 rounded-xl font-black text-lg transition-colors shadow-sm touch-manipulation border ${r===0 ? 'bg-blue-600 text-white border-transparent shadow-[0_0_10px_rgba(37,99,235,0.4)]' : 'bg-white dark:bg-slate-800 text-gray-800 dark:text-white border-gray-300 dark:border-slate-600 hover:bg-gray-100 dark:hover:bg-slate-700'}">${r}</button>`
                            }).join('')}
                          </div>
                        </div>

                        <div class="mb-6 bg-gray-50 dark:bg-slate-800/50 p-3 rounded-xl border border-gray-200 dark:border-slate-800 shadow-inner">
                          <label class="text-[10px] text-gray-600 dark:text-slate-400 font-bold uppercase mb-3 block tracking-widest">Wicket on this ball?</label>
                          <div class="grid grid-cols-2 gap-2 mb-3" id="extra-wkt-btns">
                            <button type="button" data-val="" onclick="window.selectExtraWkt('', this)" class="extra-wkt-btn col-span-2 py-3 rounded-xl text-sm font-bold border bg-blue-600 text-white border-transparent">No Wicket</button>
                            <button type="button" data-val="Run Out" onclick="window.selectExtraWkt('Run Out', this)" class="extra-wkt-btn py-3 rounded-xl text-sm font-bold border bg-white dark:bg-slate-800 text-gray-800 dark:text-white border-gray-300 dark:border-slate-600">${t.runOut}</button>
                            ${!isRunOnly && !isNB ? `<button type="button" data-val="Stumped" onclick="window.selectExtraWkt('Stumped', this)" class="extra-wkt-btn py-3 rounded-xl text-sm font-bold border bg-white dark:bg-slate-800 text-gray-800 dark:text-white border-gray-300 dark:border-slate-600">${t.stumped}</button>` : ''}
                          </div>

                          <div id="extra-ro-div" class="hidden mb-3 border-t border-gray-200 dark:border-slate-700 pt-3">
                            <label class="text-[10px] text-gray-600 dark:text-slate-400 font-bold uppercase mb-2 block tracking-widest">Runs before run out</label>
                            <div class="grid grid-cols-4 gap-2">
                                ${[0,1,2,3,4,5,6].map(r => `<button type="button" data-val="${r}" onclick="window.selectExtraRoRun(${r})" class="extra-ro-btn py-3 rounded-lg text-sm font-black border bg-white dark:bg-slate-800 text-gray-800 dark:text-white border-gray-300 dark:border-slate-600">${r}</button>`).join('')}
                            </div>
                          </div>

                          <input id="extra-fielder-input" placeholder="Fielder Name" class="hidden w-full bg-white dark:bg-slate-950 border border-gray-300 dark:border-slate-700 rounded-xl px-3 py-2 text-sm outline-none focus:border-blue-600 text-gray-900 dark:text-white shadow-inner font-bold" />
                        </div>

                        <div class="flex gap-2">
                          <button type="button" onclick="window.closeModal()" class="flex-1 py-4 bg-gray-200 dark:bg-slate-800 text-gray-800 dark:text-white rounded-xl font-bold shadow-sm border border-gray-300 dark:border-transparent">${t.cancel || 'Cancel'}</button>
                          <button type="button" onclick="window.confirmExtraModal('${mo.arg1}')" class="flex-1 py-4 text-white bg-green-600 rounded-xl font-bold shadow-[0_0_15px_rgba(22,163,74,0.3)] uppercase">${t.confirm || 'Confirm'}</button>
                        </div>
                      </div>
                    </div>
                `;
            }

            if (mo.type === 'wicket') {
                const isFreeHit = m.isFreeHit;
                const opts = isFreeHit ? ['Run Out'] : ['Bowled', 'Caught', 'Run Out', 'Stumped'];
                const stWkt = window.appState.modalState.wktType || (isFreeHit ? 'Run Out' : 'Bowled');

                return `
                    <div class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 pop-in backdrop-blur-sm modal-backdrop" id="wicket-modal-root" data-wkt="${stWkt}" data-roruns="0">
                      <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl w-full max-w-sm border border-gray-200 dark:border-slate-700 text-gray-900 dark:text-white shadow-2xl">
                        <h3 class="font-bold text-red-600 dark:text-red-500 mb-4 text-xl">${t.wicket} Type ${isFreeHit ? '(FREE HIT)' : ''}</h3>
                        <div class="grid grid-cols-2 gap-2 mb-4" id="main-wkt-btns">
                          ${opts.map(type => `
                            <button type="button" data-val="${type}" onclick="window.selectMainWicket('${type}')" class="main-wkt-btn py-4 rounded-xl font-bold border shadow-sm ${type === stWkt ? 'bg-red-600 text-white border-transparent shadow-[0_0_10px_rgba(220,38,38,0.5)]' : 'bg-gray-100 dark:bg-slate-800 text-gray-800 dark:text-white border-gray-300 dark:border-slate-600'} hover:bg-red-200 dark:hover:bg-slate-700">
                              ${type === 'Run Out' ? t.runOut : type === 'Bowled' ? t.bowled : type === 'Caught' ? t.caught : t.stumped}
                            </button>
                          `).join('')}
                        </div>

                        <div id="main-ro-div" class="${stWkt === 'Run Out' ? '' : 'hidden'} mb-4 bg-gray-50 dark:bg-slate-800/50 p-3 rounded-xl border border-gray-200 dark:border-slate-800 shadow-inner">
                          <label class="text-[10px] text-gray-600 dark:text-slate-400 font-bold uppercase mb-2 block tracking-widest">Runs before run out</label>
                          <div class="grid grid-cols-4 gap-2">
                            ${[0,1,2,3,4,5,6].map(r => `<button type="button" data-val="${r}" onclick="window.selectMainRoRun(${r})" class="main-ro-btn py-3 rounded-lg text-lg font-black border ${r === 0 ? 'bg-blue-600 text-white border-transparent' : 'bg-white dark:bg-slate-800 text-gray-800 dark:text-white border-gray-300 dark:border-slate-600'}">${r}</button>`).join('')}
                          </div>
                        </div>

                        <div id="main-fielder-div" class="${(stWkt === 'Caught' || stWkt === 'Run Out' || stWkt === 'Stumped') ? '' : 'hidden'} mb-4">
                          <label class="text-[10px] text-gray-600 dark:text-slate-400 font-bold uppercase mb-2 block tracking-widest">Fielder Name</label>
                          <input id="main-fielder-input" placeholder="e.g. Virat Kohli" class="w-full bg-gray-50 dark:bg-slate-950 border border-gray-300 dark:border-slate-700 rounded-xl px-4 py-4 text-sm outline-none focus:border-blue-600 font-bold text-gray-900 dark:text-white shadow-inner" />
                        </div>

                        <div class="flex gap-2 mt-6">
                          <button type="button" onclick="window.closeModal()" class="flex-1 py-4 bg-gray-200 dark:bg-slate-800 text-gray-800 dark:text-white rounded-xl font-bold border border-gray-300 dark:border-transparent shadow-sm">Cancel</button>
                          <button type="button" onclick="window.confirmMainWicket()" class="flex-1 py-4 text-white bg-red-600 rounded-xl font-black uppercase shadow-md tracking-wider">Confirm</button>
                        </div>
                      </div>
                    </div>
                `;
            }

            if (mo.type === 'end') {
                return `
                    <div class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 pop-in backdrop-blur-sm modal-backdrop">
                      <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl w-full max-w-sm border border-gray-200 dark:border-slate-700 shadow-2xl">
                        <h3 class="font-bold mb-6 text-center text-gray-900 dark:text-white text-lg">Are you sure you want to end this innings manually?</h3>
                        <div class="flex gap-3">
                          <button type="button" onclick="window.closeModal()" class="flex-1 bg-gray-200 dark:bg-slate-800 text-gray-800 dark:text-white py-4 rounded-xl font-bold">Cancel</button>
                          <button type="button" onclick="window.submitEndInnings(); window.closeModal();" class="flex-1 bg-red-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-red-600/30">End Innings</button>
                        </div>
                      </div>
                    </div>
                `;
            }

            if (mo.type === 'score') {
                return `
                    <div class="fixed inset-0 bg-white/95 dark:bg-slate-950/95 flex flex-col z-50 pop-in backdrop-blur-sm" style="overflow-y:auto; padding-bottom:100px;">
                      <div class="bg-white dark:bg-slate-900 border-b border-gray-200 dark:border-slate-800 p-4 flex justify-between items-center shadow-md relative z-50">
                         <h2 class="text-xl font-black uppercase tracking-widest text-blue-600 dark:text-blue-500">${t.score}</h2>
                         <button type="button" onclick="window.closeModal()" class="p-2 bg-gray-100 dark:bg-slate-800 rounded-full text-gray-600 dark:text-slate-400 hover:text-red-500 transition-colors" style="background:none;border:none;"><i class="fa-solid fa-xmark text-2xl"></i></button>
                      </div>
                      <div class="flex-1 p-4">
                        ${window.renderScorecardTables(m, t)}
                      </div>
                    </div>
                `;
            }
            return '';
        };

        // --- ABOUT VIEW ---
        window.renderAbout = function(t) {
            return `
                <div class="flex-1 p-6 overflow-y-auto max-w-3xl mx-auto w-full pb-20">
                    <div class="bg-white dark:bg-slate-900 border border-gray-200 dark:border-slate-800 rounded-2xl p-6 shadow-xl pop-in">
                        <h2 class="text-2xl font-black text-blue-600 dark:text-blue-500 mb-4 flex items-center gap-2">
                            <i class="fa-solid fa-circle-info text-3xl"></i> ${t.aboutTitle || 'About CRICSCORE_ICC'}
                        </h2>
                        <p class="text-gray-700 dark:text-slate-300 mb-4 leading-relaxed font-medium">
                            ${t.aboutP1 || 'CRICSCORE_ICC is a powerful, offline-first Progressive Web Application (PWA) built specifically for cricket enthusiasts, local tournaments, and street cricket matches.'}
                        </p>
                        <h3 class="font-bold text-lg text-gray-900 dark:text-white mt-6 mb-2">${t.aboutKey || 'Key Features'}</h3>
                        <ul class="list-disc pl-5 space-y-2 text-gray-700 dark:text-slate-300 font-medium">
                            <li><strong>${t.aboutF1 || '100% Offline: No internet connection required.'}</strong></li>
                            <li><strong>${t.aboutF2 || 'Ball-by-Ball Editing: Easily overwrite or delete any ball.'}</strong></li>
                            <li><strong>${t.aboutF3 || 'Baby Overs & Mid-Over Swaps: Change bowlers mid-over.'}</strong></li>
                            <li><strong>${t.aboutF4 || 'DLS Support: Adjust target scores dynamically.'}</strong></li>
                            <li><strong>${t.aboutF5 || 'Advanced Statistics: Track performance across tournaments.'}</strong></li>
                            <li><strong>${t.aboutF6 || 'Export & Share: Generate PDF scorecards.'}</strong></li>
                        </ul>
                        <div class="mt-8 pt-4 border-t border-gray-200 dark:border-slate-700 text-sm text-gray-500 dark:text-slate-400">
                            <p>${t.version || 'Version Final (Ultimate Zero-Reload Edition)'}</p>
                            <p>Developed by Omprakash T.</p>
                        </div>
                    </div>
                </div>
            `;
        };

        window.selectMainWicket = (type) => {
            window.appState.modalState.wktType = type;
            document.querySelectorAll('.main-wkt-btn').forEach(b => {
                if (b.dataset.val === type) {
                    b.className = 'main-wkt-btn py-4 rounded-xl font-bold border shadow-sm bg-red-600 text-white border-transparent shadow-[0_0_10px_rgba(220,38,38,0.5)]';
                } else {
                    b.className = 'main-wkt-btn py-4 rounded-xl font-bold border shadow-sm bg-gray-100 dark:bg-slate-800 text-gray-800 dark:text-white border-gray-300 dark:border-slate-600 hover:bg-red-200 dark:hover:bg-slate-700';
                }
            });
            const roDiv = document.getElementById('main-ro-div');
            if (roDiv) {
                if (type === 'Run Out') roDiv.classList.remove('hidden');
                else roDiv.classList.add('hidden');
            }
            const fldDiv = document.getElementById('main-fielder-div');
            if (fldDiv) {
                if (type === 'Caught' || type === 'Run Out' || type === 'Stumped') fldDiv.classList.remove('hidden');
                else fldDiv.classList.add('hidden');
            }
        };

        window.selectMainRoRun = (r) => {
            window.appState.modalState.roRuns = r;
            document.querySelectorAll('.main-ro-btn').forEach(b => {
                if (parseInt(b.dataset.val) === r) {
                    b.className = 'main-ro-btn py-3 rounded-lg text-lg font-black border bg-blue-600 text-white border-transparent';
                } else {
                    b.className = 'main-ro-btn py-3 rounded-lg text-lg font-black border bg-white dark:bg-slate-800 text-gray-800 dark:text-white border-gray-300 dark:border-slate-600';
                }
            });
        };

        window.confirmMainWicket = () => {
            const st = window.appState.modalState;
            const fInp = document.getElementById('main-fielder-input');
            const fielder = fInp ? fInp.value : '';
            window.submitEditOrRun(0, null, 0, true, st.wktType || 'Bowled', fielder, st.roRuns);
            window.closeModal();
        };

        window.selectExtraRun = (r) => {
            window.appState.modalState.runs = r;
            document.querySelectorAll('.extra-run-btn').forEach(b => {
                if (parseInt(b.dataset.val) === r) {
                    b.className = 'extra-run-btn py-4 rounded-xl font-black text-lg transition-colors shadow-sm touch-manipulation border bg-blue-600 text-white border-transparent shadow-[0_0_10px_rgba(37,99,235,0.4)]';
                } else {
                    b.className = 'extra-run-btn py-4 rounded-xl font-black text-lg transition-colors shadow-sm touch-manipulation border bg-white dark:bg-slate-800 text-gray-800 dark:text-white border-gray-300 dark:border-slate-600 hover:bg-gray-100 dark:hover:bg-slate-700';
                }
            });
        };

        window.selectExtraWkt = (type, btnElem) => {
            window.appState.modalState.wktType = type;
            document.querySelectorAll('.extra-wkt-btn').forEach(b => {
                let isSel = b.dataset.val === type;
                let baseCls = 'extra-wkt-btn py-3 rounded-xl text-sm font-bold border ';
                if(b.dataset.val === '') baseCls += 'col-span-2 ';
                
                if (isSel) {
                    b.className = baseCls + 'bg-blue-600 text-white border-transparent';
                } else {
                    b.className = baseCls + 'bg-white dark:bg-slate-800 text-gray-800 dark:text-white border-gray-300 dark:border-slate-600';
                }
            });
            
            const roDiv = document.getElementById('extra-ro-div');
            if (roDiv) {
                if (type === 'Run Out') roDiv.classList.remove('hidden');
                else roDiv.classList.add('hidden');
            }
            const fInp = document.getElementById('extra-fielder-input');
            if (fInp) {
                if (type) fInp.classList.remove('hidden');
                else fInp.classList.add('hidden');
            }
        };

        window.selectExtraRoRun = (r) => {
            window.appState.modalState.roRuns = r;
            document.querySelectorAll('.extra-ro-btn').forEach(b => {
                if (parseInt(b.dataset.val) === r) {
                    b.className = 'extra-ro-btn py-3 rounded-lg text-sm font-black border bg-blue-600 text-white border-transparent';
                } else {
                    b.className = 'extra-ro-btn py-3 rounded-lg text-sm font-black border bg-white dark:bg-slate-800 text-gray-800 dark:text-white border-gray-300 dark:border-slate-600';
                }
            });

        window.confirmExtraModal = (extraType) => {
            const st = window.appState.modalState;
            const fInp = document.getElementById('extra-fielder-input');
            const fielder = fInp ? fInp.value : '';
            
            let actRuns = 0;
            let extraRuns = 0;
            if (extraType === 'WD' || extraType === 'NB') {
                extraRuns = st.runs || 0;
            } else if (extraType === 'LB' || extraType === 'BYE') {
                actRuns = st.runs || 0;
            }

            window.submitEditOrRun(actRuns, extraType, extraRuns, !!st.wktType, st.wktType, fielder, st.roRuns);
            window.closeModal();
        };

        window.generatePDFLayout = function(match, t) {
            let html = `
            <div style="width: 800px; padding: 40px; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #0f172a; background: #ffffff; box-sizing: border-box;">
                
                <!-- Match Report Header -->
                <div style="text-align: center; margin-bottom: 25px; border-bottom: 3px solid #cbd5e1; padding-bottom: 15px;">
                    <h1 style="font-size: 38px; font-weight: 900; color: #1e3a8a; margin: 0; text-transform: uppercase; letter-spacing: 2px;">MATCH REPORT</h1>
                    <div style="font-size: 16px; color: #64748b; margin-top: 8px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;">
                        ${match.roundStr || 'MATCH'} &bull; ${window.formatDateStr(match.createdAt)}
                    </div>
                </div>

                <!-- Teams & Scores Summary -->
                <table style="width: 100%; border-collapse: collapse; margin-bottom: 30px;">
                    <tr>
                        <td style="width: 45%; text-align: right; vertical-align: middle; padding: 10px;">
                            <div style="font-size: 36px; font-weight: 900; color: #2563eb; text-transform: uppercase;">${match.team1}</div>
                            ${match.score1 ? `<div style="font-size: 24px; font-weight: bold; color: #334155; margin-top: 5px;">${match.score1.runs}/${match.score1.wickets} <span style="font-size: 16px; color: #64748b;">(${window.fmtOvers(match.score1.balls)})</span></div>` : ''}
                        </td>
                        <td style="width: 10%; text-align: center; vertical-align: middle; font-size: 28px; font-weight: 900; color: #ef4444; padding: 10px;">VS</td>
                        <td style="width: 45%; text-align: left; vertical-align: middle; padding: 10px;">
                            <div style="font-size: 36px; font-weight: 900; color: #16a34a; text-transform: uppercase;">${match.team2}</div>
                            ${(match.score2 && (match.innings === 2 || match.matchStatus !== 'playing')) ? `<div style="font-size: 24px; font-weight: bold; color: #334155; margin-top: 5px;">${match.score2.runs}/${match.score2.wickets} <span style="font-size: 16px; color: #64748b;">(${window.fmtOvers(match.score2.balls)})</span></div>` : ''}
                        </td>
                    </tr>
                </table>
            `;

            // Result
            let res = "";
            if (match.matchStatus !== 'playing' && match.matchStatus !== 'innings_break') {
               if (match.isSuperOver && match.matchStatus !== 'tie') res = `${match.matchStatus === 'team1_won' ? match.team1 : match.team2} ${t.wonBy} the ${match.tieBreakerInfo}`;
               else if (match.tieBreakerInfo && !match.isSuperOver) res = `${match.matchStatus === 'team1_won' ? match.team1 : match.team2} ${t.wonBy} ${match.tieBreakerInfo}`;
               else if (match.matchStatus === 'team1_won') res = `${match.team1} ${t.wonBy} ${match.score1.runs - match.score2.runs} runs`;
               else if (match.matchStatus === 'team2_won') {
                   const target = match.revisedTarget ? match.revisedTarget : match.score1.runs + 1;
                   const ballsLeft = (match.overs * 6) - match.score2.balls;
                   res = `${match.team2} ${t.wonBy} ${10 - match.score2.wickets} wkts (${ballsLeft} balls left)`;
               } else if (match.matchStatus === 'tie') res = t.tied;
               
               html += `<div style="text-align: center; background-color: #dc2626; color: #ffffff; padding: 20px; border-radius: 8px; font-size: 24px; font-weight: 900; margin-bottom: 40px; text-transform: uppercase; border: 3px solid #991b1b;">${res}</div>`;
            }

            const matchSets = match.isSuperOver ? [ { s1: match.mainScore1, s2: match.mainScore2, label: 'MAIN MATCH' }, { s1: match.score1, s2: match.score2, label: match.tieBreakerInfo?.toUpperCase() || 'TIE BREAKER' } ] : [ { s1: match.score1, s2: match.score2, label: '' } ];

            matchSets.forEach((mSet) => {
                if (mSet.label) html += `<div style="text-align: center; border-bottom: 3px solid #cbd5e1; padding-bottom: 10px; margin-top: 30px; margin-bottom: 20px; font-size: 22px; font-weight: 900; color: #1e293b; letter-spacing: 2px; text-transform: uppercase;">${mSet.label}</div>`;
                
                [mSet.s1, mSet.s2].forEach((sc, i) => {
                    if (!sc || !(i === 0 || match.innings === 2 || match.matchStatus !== 'playing')) return;
                    const team = i === 0 ? match.team1 : match.team2;
                    const innPrefix = i === 0 ? '1st ' : '2nd ';

                    html += `<div style="margin-top: 25px; border: 2px solid #94a3b8; border-radius: 8px; overflow: hidden; background: #ffffff;">`;
                    
                    // Innings Header
                    html += `
                        <table style="width: 100%; border-collapse: collapse; background-color: #1e3a8a; color: #ffffff;">
                            <tr>
                                <td style="padding: 12px 20px; font-size: 20px; font-weight: 900; text-transform: uppercase; text-align: left;">${innPrefix}INNINGS - ${team}</td>
                                <td style="padding: 12px 20px; font-size: 20px; font-weight: 900; text-align: right;">${sc.runs}/${sc.wickets} <span style="font-size: 16px; font-weight: normal; opacity: 0.9;">(${window.fmtOvers(sc.balls)} Overs)</span></td>
                            </tr>
                        </table>
                    `;

                    // Batting Table
                    html += `<table style="width: 100%; border-collapse: collapse; font-size: 16px;">
                                <thead>
                                    <tr style="background-color: #e0e7ff; color: #1e3a8a;">
                                        <th style="padding: 12px 15px; font-weight: bold; text-align: left; border: 1px solid #cbd5e1; width: 40%;">BATSMAN</th>
                                        <th style="padding: 12px 10px; font-weight: bold; text-align: center; border: 1px solid #cbd5e1; width: 12%;">R</th>
                                        <th style="padding: 12px 10px; font-weight: bold; text-align: center; border: 1px solid #cbd5e1; width: 12%;">B</th>
                                        <th style="padding: 12px 10px; font-weight: bold; text-align: center; border: 1px solid #cbd5e1; width: 12%;">4s</th>
                                        <th style="padding: 12px 10px; font-weight: bold; text-align: center; border: 1px solid #cbd5e1; width: 12%;">6s</th>
                                        <th style="padding: 12px 10px; font-weight: bold; text-align: center; border: 1px solid #cbd5e1; width: 12%;">SR</th>
                                    </tr>
                                </thead>
                                <tbody>`;
                    sc.allBatters.forEach((b, j) => {
                        if (b.balls === 0 && !b.isOut && j > 1 && match.matchStatus === 'playing') return;
                        html += `<tr style="background-color: ${j % 2 === 0 ? '#ffffff' : '#f8fafc'};">
                                    <td style="padding: 10px 15px; text-align: left; border: 1px solid #cbd5e1;">
                                        <div style="font-weight: bold; font-size: 18px; color: #0f172a;">${b.name}</div>
                                        <div style="font-size: 14px; color: #dc2626; margin-top: 2px; font-weight: bold;">${b.isOut ? (b.dismissal || '(out)') : 'not out'}</div>
                                    </td>
                                    <td style="padding: 10px; text-align: center; font-weight: 900; font-size: 18px; border: 1px solid #cbd5e1;">${b.runs}</td>
                                    <td style="padding: 10px; text-align: center; color: #475569; border: 1px solid #cbd5e1;">${b.balls}</td>
                                    <td style="padding: 10px; text-align: center; color: #475569; border: 1px solid #cbd5e1;">${b.fours}</td>
                                    <td style="padding: 10px; text-align: center; color: #475569; border: 1px solid #cbd5e1;">${b.sixes}</td>
                                    <td style="padding: 10px; text-align: center; color: #475569; border: 1px solid #cbd5e1;">${window.calcSR(b.runs, b.balls)}</td>
                                 </tr>`;
                    });
                    html += `</tbody></table>`;
                    
                    // Extras
                    html += `<div style="padding: 12px 20px; background-color: #f1f5f9; font-size: 16px; color: #334155; font-weight: bold; border-bottom: 2px solid #94a3b8; border-top: 2px solid #94a3b8;">
                                EXTRAS: <span style="color: #0f172a; font-weight: 900; font-size: 18px; margin-right: 15px;">${sc.extras}</span> 
                                <span style="font-size: 14px; font-weight: normal;">(WD: ${sc.wides}, NB: ${sc.noBalls})</span>
                             </div>`;

                    // Bowling Table
                    html += `<table style="width: 100%; border-collapse: collapse; font-size: 16px;">
                                <thead>
                                    <tr style="background-color: #e0e7ff; color: #1e3a8a;">
                                        <th style="padding: 12px 15px; font-weight: bold; text-align: left; border: 1px solid #cbd5e1; width: 40%;">BOWLER</th>
                                        <th style="padding: 12px 10px; font-weight: bold; text-align: center; border: 1px solid #cbd5e1; width: 15%;">O</th>
                                        <th style="padding: 12px 10px; font-weight: bold; text-align: center; border: 1px solid #cbd5e1; width: 15%;">R</th>
                                        <th style="padding: 12px 10px; font-weight: bold; text-align: center; border: 1px solid #cbd5e1; width: 15%;">W</th>
                                        <th style="padding: 12px 10px; font-weight: bold; text-align: center; border: 1px solid #cbd5e1; width: 15%;">ECO</th>
                                    </tr>
                                </thead>
                                <tbody>`;
                    sc.allBowlers.forEach((b, j) => {
                        if (b.balls === 0 && b.runs === 0 && match.matchStatus === 'playing') return;
                        html += `<tr style="background-color: ${j % 2 === 0 ? '#ffffff' : '#f8fafc'};">
                                    <td style="padding: 10px 15px; text-align: left; font-weight: bold; font-size: 18px; color: #0f172a; border: 1px solid #cbd5e1;">${b.name}</td>
                                    <td style="padding: 10px; text-align: center; color: #475569; border: 1px solid #cbd5e1;">${window.fmtOvers(b.balls)}</td>
                                    <td style="padding: 10px; text-align: center; font-weight: 900; font-size: 18px; border: 1px solid #cbd5e1;">${b.runs}</td>
                                    <td style="padding: 10px; text-align: center; font-weight: 900; font-size: 18px; color: #dc2626; border: 1px solid #cbd5e1;">${b.wickets}</td>
                                    <td style="padding: 10px; text-align: center; color: #475569; border: 1px solid #cbd5e1;">${window.calcEco(b.runs, b.balls)}</td>
                                 </tr>`;
                    });
                    html += `</tbody></table>`;
                    html += `</div>`; // End of Innings Container
                });
            });

            html += `<div style="text-align: center; font-size: 12px; font-weight: bold; color: #94a3b8; margin-top: 40px; padding-top: 20px; border-top: 2px dashed #cbd5e1; letter-spacing: 2px; text-transform: uppercase;">GENERATED BY CRICSCORE_ICC</div>`;
            html += `</div>`;
            return html;
        };

        window.shareMatch = async () => {
            const m = window.appState.selectedHistoryMatch || window.appState.activeMatch;
            if (!m) return;
            const t = dict[window.appState.lang] || dict['en'];
            const s1 = m.isSuperOver ? m.mainScore1 : m.score1;
            const s2 = m.isSuperOver ? m.mainScore2 : m.score2;
            let text = `CRICSCORE_ICC - Match Report\n\n${m.team1} vs ${m.team2}\n`;
            if (s1) text += `${m.team1}: ${s1.runs}/${s1.wickets} (${window.fmtOvers(s1.balls)} Overs)\n`;
            if (s2 && (m.innings === 2 || (m.matchStatus !== 'playing' && m.matchStatus !== 'innings_break'))) {
                text += `${m.team2}: ${s2.runs}/${s2.wickets} (${window.fmtOvers(s2.balls)} Overs)\n`;
            }
            
            window.customAlert("Preparing PDF to share... Please wait.");

            const htmlStr = window.generatePDFLayout(m, t);
            
            // Create an invisible wrapper that has zero height, but contains the full layout inside.
            const wrapper = document.createElement('div');
            wrapper.style.position = 'absolute';
            wrapper.style.top = '0';
            wrapper.style.left = '0';
            wrapper.style.width = '0px';
            wrapper.style.height = '0px';
            wrapper.style.overflow = 'hidden';
            wrapper.style.pointerEvents = 'none';

            // The actual container
            const container = document.createElement('div');
            container.style.width = '800px';
            container.style.backgroundColor = '#ffffff';
            container.innerHTML = htmlStr;

            wrapper.appendChild(container);
            document.body.appendChild(wrapper);

            await new Promise(r => setTimeout(r, 400)); // Allow DOM to fully paint the element

            const filename = `Match_Report_${m.team1}_vs_${m.team2}.pdf`;
            const opt = {
                margin:       0.2,
                filename:     filename,
                image:        { type: 'jpeg', quality: 1.0 },
                html2canvas:  { scale: 2, useCORS: true, logging: false },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            try {
                const pdfBlob = await html2pdf().set(opt).from(container).output('blob');
                
                const file = new File([pdfBlob], filename, { type: 'application/pdf' });
                
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    try {
                        await navigator.share({
                            title: 'Match Report',
                            text: text,
                            files: [file]
                        });
                    } catch (err) {
                        console.log('Share error', err);
                    }
                } else if (navigator.share) {
                    await navigator.share({ title: 'Match Report', text: text });
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand("copy");
                    textArea.remove();
                    window.customAlert("Score summary copied! (PDF sharing requires a compatible mobile browser)");
                }
            } catch(e) {
                console.log('PDF generation error', e);
            } finally {
                document.body.removeChild(wrapper);
            }
        };

        window.downloadPDF = async () => {
            const m = window.appState.selectedHistoryMatch || window.appState.activeMatch;
            if (!m) return;
            const t = dict[window.appState.lang] || dict['en'];

            window.customAlert("Generating PDF Report... Please wait.");
            
            const htmlStr = window.generatePDFLayout(m, t);

            // Create an invisible wrapper that has zero height, but contains the full layout inside.
            const wrapper = document.createElement('div');
            wrapper.style.position = 'absolute';
            wrapper.style.top = '0';
            wrapper.style.left = '0';
            wrapper.style.width = '0px';
            wrapper.style.height = '0px';
            wrapper.style.overflow = 'hidden';
            wrapper.style.pointerEvents = 'none';

            // The actual container
            const container = document.createElement('div');
            container.style.width = '800px';
            container.style.backgroundColor = '#ffffff';
            container.innerHTML = htmlStr;

            wrapper.appendChild(container);
            document.body.appendChild(wrapper);

            await new Promise(r => setTimeout(r, 400)); // Allow DOM to fully paint the element

            const opt = {
                margin:       0.2,
                filename:     `Match_Report_${m.team1}_vs_${m.team2}.pdf`,
                image:        { type: 'jpeg', quality: 1.0 },
                html2canvas:  { scale: 2, useCORS: true, logging: false },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            
            try {
                await html2pdf().set(opt).from(container).save();
            } catch (err) {
                console.error("PDF generation failed:", err);
            } finally {
                document.body.removeChild(wrapper);
            }
        };

        // --- BOOTSTRAP APP ---
        document.addEventListener('DOMContentLoaded', () => {
            window.appState.onBackHandler = () => window.changeView('setup');
            window.renderApp();
        });

    </script>
</body>
